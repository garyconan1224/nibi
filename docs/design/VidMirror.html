<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>VidMirror — AI 视频创作工作台</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css?v=3"/>
<link rel="stylesheet" href="styles-preflight.css"/>

<!-- Google font for CJK serif -->
<style>
/* ─── Extra styles for new components not in styles.css ─── */

/* Animated dots */
.proc-dots span { animation: proc-blink 1.4s infinite both; }
.proc-dots span:nth-child(2) { animation-delay: 0.2s; }
.proc-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes proc-blink { 0%,80%,100% { opacity: 0.2; } 40% { opacity: 1; } }

/* Caret blink */
.caret { animation: blink 0.9s step-end infinite; }
@keyframes blink { 50% { opacity: 0; } }

/* btn-lg variant */
.btn-lg { height: 42px; padding: 0 20px; font-size: 15px; }

/* Hero h1 */
.hero h1.display .accent-pink  { color: var(--accent); }
.hero h1.display .accent-purple { color: var(--accent-2); }
.hero h1.display .accent-blue  { color: var(--accent-3); }

/* fix .hero p → use .lede */
.hero .lede {
  font-size: 17px; line-height: 1.55; color: var(--ink-2);
  max-width: 600px; margin: 0 0 44px;
}

/* Composer comp-top alias */
.comp-top {
  display: flex; align-items: center; gap: 14px;
  padding: 20px 24px;
  border-bottom: 1px solid var(--line);
}
.comp-top input {
  flex: 1; font-size: 20px;
  background: transparent; border: none; outline: none;
  color: var(--ink); min-width: 0;
}
.comp-top input::placeholder { color: var(--ink-4); }
.comp-top .platform {
  width: 40px; height: 40px; border-radius: 12px;
  display: grid; place-items: center;
  background: var(--bg-sunken); color: var(--ink-2); flex-shrink: 0;
}

/* Step pill icon fix */
.step-pill svg { flex-shrink: 0; }

/* Results split (when layout=split) */
.res-split {
  display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
  min-height: 0;
}
.res-head {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 20px; margin-bottom: 20px;
}
.rh-left { flex: 1; min-width: 0; }
.rh-right { display: flex; gap: 8px; flex-shrink: 0; flex-wrap: wrap; }
.rh-eyebrow { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
.rh-title {
  font-family: var(--display); font-size: 36px;
  line-height: 1.05; margin: 0 0 10px; letter-spacing: -0.01em;
}
.rh-title span { color: var(--ink-3); font-size: 24px; }
.rh-by {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: var(--ink-3);
}
.avatar {
  width: 24px; height: 24px; border-radius: 99px;
  background: var(--ink); color: var(--bg);
  display: grid; place-items: center;
  font-size: 10px; font-weight: 700; font-family: var(--mono);
}

/* Player */
.player {
  aspect-ratio: 16/9; background: var(--pbg, #000);
  border-radius: 16px; position: relative; overflow: hidden;
  cursor: pointer;
}
.player img { width: 100%; height: 100%; object-fit: cover; display: block; }
.pl-overlay {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 16px;
  background: linear-gradient(0deg, rgba(0,0,0,0.7) 0%, transparent);
  color: #fff;
}
.pl-ts { font-family: var(--mono); font-size: 10px; opacity: 0.7; }
.pl-title { font-size: 16px; font-weight: 700; margin-top: 3px; }
.pl-sub { font-size: 11px; opacity: 0.7; }
.pl-play {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  width: 52px; height: 52px; border-radius: 99px;
  background: rgba(255,255,255,0.9); color: #000;
  display: grid; place-items: center;
}

/* Frame strip */
.frame-strip {
  display: flex; gap: 6px; overflow-x: auto;
  padding: 10px 0 6px;
  scroll-snap-type: x mandatory;
}
.fs-item {
  flex-shrink: 0; width: 100px; scroll-snap-align: start;
  cursor: pointer;
  border-radius: 8px; overflow: hidden;
  border: 2px solid transparent;
  transition: border-color 140ms ease, transform 140ms ease;
  background: var(--bg-sunken);
}
.fs-item[data-active="true"] { border-color: var(--accent); }
.fs-item:hover { transform: translateY(-1px); }
.fs-item img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
.fs-ts { font-family: var(--mono); font-size: 9px; color: var(--ink-3); padding: 3px 6px 0; }
.fs-t { font-size: 10px; padding: 1px 6px 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Keyword row */
.kw-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; padding-top: 12px; }
.kw-lab { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); }
.kw {
  padding: 4px 10px; border-radius: 99px;
  background: var(--bg-sunken); border: 1px solid var(--line);
  font-size: 12px; color: var(--ink-2);
}

/* Notes tabs */
.rn-tabs {
  display: flex; align-items: center; gap: 4px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--line);
  background: var(--bg-elev);
  position: sticky; top: 0; z-index: 2;
}
.rn-tabs button {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 12px; border-radius: 10px;
  font-size: 12.5px; font-weight: 500;
  color: var(--ink-3);
  transition: all 120ms ease;
}
.rn-tabs button[data-active="true"] { background: var(--ink); color: var(--bg); }
.rn-tabs button:hover:not([data-active="true"]) { background: var(--bg-sunken); color: var(--ink); }
.rn-tabs-spacer { flex: 1; }
.rn-body { flex: 1; overflow-y: auto; padding: 18px 22px; }
.rn-foot {
  padding: 10px 16px;
  border-top: 1px solid var(--line);
  display: flex; align-items: center; gap: 10px;
}
.ai-in {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px;
  background: var(--bg-sunken); border: 1px solid var(--line);
  border-radius: 99px;
  font-size: 13px; color: var(--ink-3);
  flex: 1;
}
.ai-in input { flex: 1; background: transparent; border: none; outline: none; font-size: 13px; }

/* Transcript alternate classes used in results.jsx */
.tr-line { display: grid; grid-template-columns: 58px 1fr; gap: 12px; padding: 8px 6px; border-radius: 6px; cursor: pointer; }
.tr-line:hover { background: var(--bg-sunken); }
.tr-line[data-active="true"] { background: linear-gradient(90deg, rgba(255,77,126,0.08), transparent); }
.tr-line .ts { font-family: var(--mono); font-size: 11px; color: var(--ink-3); padding-top: 2px; }
.tr-line[data-active="true"] .ts { color: var(--accent); }
.tr-line .txt { font-size: 14px; line-height: 1.55; color: var(--ink-2); }
.tr-line[data-active="true"] .txt { color: var(--ink); font-weight: 500; }

/* Mindmap override */
.mindmap svg text { font-family: var(--sans); }
.mm-svg { width: 100%; height: 100%; }

/* Processing extras */
.proc { height: 100%; display: flex; flex-direction: column; overflow-y: auto; padding: 28px 32px; gap: 24px; }
.proc-head { display: flex; align-items: flex-start; justify-content: space-between; }
.proc-title h1 { font-family: var(--display); font-size: 48px; margin: 8px 0 10px; letter-spacing: -0.02em; }
.proc-eyebrow { font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); }
.proc-sub { display: flex; gap: 8px; flex-wrap: wrap; }
.proc-actions { display: flex; gap: 8px; flex-shrink: 0; }
.proc-grid { display: grid; grid-template-columns: 1fr 1fr 300px; gap: 20px; }
.stages { background: var(--bg-elev); border: 1px solid var(--line); border-radius: var(--radius-lg); overflow: hidden; }
.stage { display: grid; grid-template-columns: 32px 40px 1fr auto; gap: 12px; align-items: center; padding: 14px 20px; border-bottom: 1px solid var(--line); }
.stage:last-child { border-bottom: none; }
.stage-num { font-family: var(--mono); font-size: 10px; color: var(--ink-4); }
.stage-ic { width: 36px; height: 36px; border-radius: 10px; display: grid; place-items: center; background: var(--bg-sunken); color: var(--ink-3); transition: all 200ms; }
.stage[data-state="running"] .stage-ic { background: var(--ink); color: var(--bg); }
.stage[data-state="done"] .stage-ic { background: var(--accent-green); color: #fff; }
.stage[data-state="queued"] { opacity: 0.5; }
.stage-top { display: flex; align-items: center; gap: 8px; }
.stage-t { font-size: 14px; font-weight: 600; }
.stage-s { font-family: var(--mono); font-size: 10px; color: var(--ink-3); letter-spacing: 0.08em; }
.stage-pct { font-family: var(--mono); font-size: 12px; color: var(--ink-3); }
.stage[data-state="running"] .stage-pct { color: var(--ink); }
.stage[data-state="done"] .stage-pct { color: var(--accent-green); }
.stage-bar { height: 2px; background: var(--bg-sunken); border-radius: 2px; overflow: hidden; margin-top: 5px; }
.stage-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2), var(--accent-3)); transition: width 400ms ease; }
.stage[data-state="done"] .stage-fill { background: var(--accent-green); }
.proc-preview { background: var(--bg-elev); border: 1px solid var(--line); border-radius: var(--radius-lg); overflow: hidden; display: flex; flex-direction: column; }
.pp-eyebrow { display: flex; align-items: center; gap: 8px; padding: 12px 16px; border-bottom: 1px solid var(--line); font-size: 12px; font-family: var(--mono); color: var(--ink-3); }
.pp-frames { flex: 1; padding: 12px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; overflow: hidden; }
.pp-fr { border-radius: 6px; overflow: hidden; opacity: 0.5; transition: opacity 200ms, transform 200ms; }
.pp-fr[data-active="true"] { opacity: 1; transform: scale(1.04); outline: 2px solid var(--accent); }
.pp-fr img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
.pp-fr-meta { padding: 4px 6px; font-size: 9px; font-family: var(--mono); color: var(--ink-3); display: flex; gap: 6px; background: var(--bg-sunken); }
.pp-waveform { display: flex; align-items: flex-end; gap: 1.5px; height: 40px; padding: 6px 12px; background: var(--bg-sunken); border-top: 1px solid var(--line); }
.wv-bar { flex: 1; background: var(--ink-3); border-radius: 1px; transition: opacity 300ms; }
.proc-logs { background: var(--bg-elev); border: 1px solid var(--line); border-radius: var(--radius-lg); overflow: hidden; display: flex; flex-direction: column; }
.pl-head { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid var(--line); font-family: var(--mono); font-size: 11px; color: var(--ink-3); }
.pl-body { flex: 1; overflow-y: auto; padding: 10px 14px; font-family: var(--mono); font-size: 11px; display: flex; flex-direction: column; gap: 4px; }
.pl-line { display: flex; gap: 8px; padding: 2px 0; }
.pl-ts { color: var(--ink-4); flex-shrink: 0; }
.pl-s { flex-shrink: 0; }
.pl-s[data-s="dl"]  { color: var(--accent-3); }
.pl-s[data-s="fr"]  { color: var(--accent-warm); }
.pl-s[data-s="asr"] { color: var(--accent); }
.pl-s[data-s="vlm"] { color: var(--accent-2); }
.pl-s[data-s="sum"] { color: var(--accent-green); }
.pl-s[data-s="st"]  { color: var(--ink-2); }
.pl-cursor { opacity: 0.5; }
.proc-bar { background: var(--bg-elev); border: 1px solid var(--line); border-radius: var(--radius); padding: 14px 20px; }
.pb-track { position: relative; height: 4px; background: var(--bg-sunken); border-radius: 4px; overflow: hidden; }
.pb-fill { position: absolute; top: 0; left: 0; bottom: 0; background: linear-gradient(90deg, var(--accent), var(--accent-2), var(--accent-3)); transition: width 400ms ease; border-radius: 4px; }
.pb-tick { position: absolute; top: -4px; bottom: -4px; width: 1px; background: var(--bg-elev); opacity: 0.6; }
.pb-labels { position: relative; height: 18px; margin-top: 4px; }
.pb-lab { position: absolute; transform: translateX(-50%); font-family: var(--mono); font-size: 9px; color: var(--ink-4); letter-spacing: 0.08em; }

/* storyboard extras */
.sbd-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; margin-bottom: 20px; }
.sbd-t { font-family: var(--display); font-size: 26px; font-weight: 400; margin: 6px 0 0; line-height: 1.3; max-width: 700px; }
.sbd-stats { display: flex; gap: 14px; }
.sbd-stats > div { text-align: center; }
.sbd-stats .mono { font-family: var(--display); font-size: 32px; }
.sbd-stats span { font-family: var(--mono); font-size: 10px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.1em; }

/* data-dim */
[data-dim="true"] { opacity: 0.5; cursor: not-allowed !important; }

/* btn-run icon */
.btn-run .iconwrap { width: 28px; height: 28px; }

/* proc-wrap: actual layout */
.proc-wrap {
  max-width: 1440px;
  padding: 28px;
}

/* zh-en helper */
.zh-en { font-size: 13px; font-family: var(--mono); color: var(--ink-4); letter-spacing: 0.08em; }

/* workarea scroll */
.workarea { height: 100%; overflow: hidden; }
.main-scroll { height: 100%; overflow-y: auto; }

/* eyebrow helper */
.eyebrow {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--ink-3);
}

/* Mindmap svg variables */
.mm-svg { --fg: var(--ink); --fg-2: var(--ink-2); --bg: var(--bg-elev); }

/* ─────────────────────────────────────────
   v2.1 Taskboard
   ───────────────────────────────────────── */
.tb-wrap { max-width: 1400px; margin: 0 auto; padding: 28px 32px 48px; }
.tb-head {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 24px; margin-bottom: 28px;
}
.tb-head-l { flex: 1; min-width: 0; }
.tb-head-r { display: flex; gap: 8px; flex-shrink: 0; padding-top: 28px; }
.tb-ctx {
  display: grid; grid-template-columns: auto 1fr auto 1fr auto 1fr;
  gap: 6px 16px; max-width: 900px; align-items: baseline;
}
.ctx-k { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--ink-3); }
.ctx-v { font-size: 13px; color: var(--ink-2); }

.tb-tabs {
  display: flex; gap: 2px; padding: 5px;
  background: var(--bg-sunken); border-radius: 14px;
  margin-bottom: 24px; flex-wrap: wrap;
}
.tb-tab {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 14px; border-radius: 10px;
  font-size: 13px; font-weight: 500; color: var(--ink-3);
  transition: all 160ms ease;
}
.tb-tab[data-active="true"] {
  background: var(--bg-elev); color: var(--ink);
  box-shadow: var(--shadow-sm);
}
.tb-tab:hover:not([data-active="true"]) { color: var(--ink); }
.tb-tab-n {
  display: inline-grid; place-items: center;
  min-width: 20px; height: 18px; padding: 0 6px;
  border-radius: 99px; background: var(--bg-sunken);
  font-family: var(--mono); font-size: 10px;
}
.tb-tab[data-active="true"] .tb-tab-n { background: var(--ink); color: var(--bg); }

.tb-head-mini {
  display: flex; align-items: flex-end; justify-content: space-between;
  margin-bottom: 18px; gap: 16px; flex-wrap: wrap;
}

/* Materials grid */
.tb-mat-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px;
}
.mat-card {
  background: var(--bg-elev); border: 1px solid var(--line);
  border-radius: var(--radius); overflow: hidden;
  display: flex; flex-direction: column;
  transition: all 200ms ease; cursor: pointer;
}
.mat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.mat-thumb { position: relative; aspect-ratio: 16/9; background: var(--bg-sunken); overflow: hidden; }
.mat-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.mat-type {
  position: absolute; top: 10px; left: 10px;
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 9px; border-radius: 99px;
  background: rgba(0,0,0,0.7); color: #fff;
  font-size: 10px; font-weight: 600;
}
.mat-type[data-tone="pink"]   { background: var(--accent); }
.mat-type[data-tone="purple"] { background: var(--accent-2); }
.mat-type[data-tone="blue"]   { background: var(--accent-3); }
.mat-type[data-tone="amber"]  { background: var(--accent-warm); color: #111; }
.mat-prog {
  position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
  background: rgba(0,0,0,0.2);
}
.mat-prog > div { height: 100%; background: var(--accent); transition: width 400ms; }
.mat-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 6px; }
.mat-title { font-size: 14px; font-weight: 600; line-height: 1.35;
  overflow: hidden; text-overflow: ellipsis;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.mat-meta { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--ink-3); }
.mat-meta .dot { width: 6px; height: 6px; border-radius: 99px; flex-shrink: 0; }
.mat-sub { font-size: 11px; color: var(--ink-4); }
.mat-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 4px; }

.mat-add {
  border: 2px dashed var(--line-strong); background: transparent;
  min-height: 240px; display: grid; place-items: center;
}
.mat-add:hover { border-color: var(--ink); background: var(--bg-sunken); }
.mat-add-inner { text-align: center; color: var(--ink-3); padding: 20px; }
.mat-add-inner svg { color: var(--ink-3); }
.mat-add:hover .mat-add-inner { color: var(--ink); }
.mat-add-types { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; margin-top: 12px; }

/* Tag library */
.tb-tag-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 14px; }
.tag-col { background: var(--bg-elev); border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; }
.tag-col-h {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px; border-bottom: 1px solid var(--line);
  font-family: var(--display); font-size: 20px;
}
.tag-col-b { padding: 8px 8px 10px; display: flex; flex-direction: column; gap: 2px; }
.tag-row {
  display: grid; grid-template-columns: 1fr auto; gap: 10px;
  padding: 8px 10px; border-radius: 8px; align-items: center;
}
.tag-row:hover { background: var(--bg-sunken); }
.tag-l { display: flex; align-items: center; gap: 8px; min-width: 0; }
.tag-name { font-size: 13px; font-weight: 500; }
.tag-badge {
  padding: 1px 6px; border-radius: 4px;
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.06em;
}
.tag-badge.auto { background: rgba(60,119,251,0.12); color: var(--accent-3); }
.tag-badge.manual { background: var(--bg-sunken); color: var(--ink-3); border: 1px solid var(--line); }
.tag-r { display: flex; align-items: center; gap: 8px; }
.tag-bar { width: 60px; height: 4px; background: var(--bg-sunken); border-radius: 4px; overflow: hidden; }
.tag-bar > span { display: block; height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); }

/* Favorites */
.fav-split { display: grid; grid-template-columns: 360px 1fr; gap: 16px; }
.fav-list { display: flex; flex-direction: column; gap: 6px; }
.fav-item {
  display: grid; grid-template-columns: 80px 1fr auto;
  gap: 12px; align-items: center; padding: 10px;
  background: var(--bg-elev); border: 1px solid var(--line);
  border-radius: 14px; cursor: pointer; transition: all 160ms ease;
}
.fav-item:hover { border-color: var(--ink-3); }
.fav-item[data-active="true"] { border-color: var(--ink); background: var(--bg-sunken); }
.fav-th { aspect-ratio: 16/9; background: var(--bg-sunken); border-radius: 8px; overflow: hidden; }
.fav-th img { width: 100%; height: 100%; object-fit: cover; display: block; }
.fav-note { font-size: 13px; font-weight: 600; line-height: 1.3; }
.fav-meta { min-width: 0; }

.fav-detail { background: var(--bg-elev); border: 1px solid var(--line); border-radius: var(--radius-lg); overflow: hidden; }
.fav-hero { position: relative; aspect-ratio: 16/9; background: var(--bg-sunken); }
.fav-hero img { width: 100%; height: 100%; object-fit: cover; display: block; }
.fav-hero-ov {
  position: absolute; bottom: 0; left: 0; right: 0; padding: 14px;
  background: linear-gradient(0deg, rgba(0,0,0,0.8), transparent);
  color: #fff; display: flex; gap: 12px; align-items: center;
  font-size: 14px; font-weight: 600;
}
.fav-prompt { padding: 18px 20px; }
.fp-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.fp-text {
  font-family: var(--mono); font-size: 13px; line-height: 1.6;
  background: var(--bg-sunken); padding: 14px 16px;
  border-radius: 12px; border: 1px solid var(--line);
  color: var(--ink);
}
.fp-foot { display: flex; gap: 8px; margin-top: 14px; }

/* Style report */
.style-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  grid-auto-rows: minmax(200px, auto); gap: 14px;
}
.style-panel { background: var(--bg-elev); border: 1px solid var(--line); border-radius: var(--radius); padding: 18px 20px; overflow: hidden; }
.style-panel.span-2 { grid-column: span 2; }
.sp-h { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }

.wordcloud {
  display: flex; flex-wrap: wrap; gap: 8px 16px; align-items: baseline;
  line-height: 1.15; font-family: var(--display);
  padding: 8px 0;
}
.wc-w { transition: transform 200ms; cursor: pointer; }
.wc-w:hover { transform: scale(1.05); }

.palette { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; height: 120px; }
.pal-sw {
  border-radius: 10px; position: relative; overflow: hidden;
  display: flex; align-items: flex-end; padding: 8px;
}
.pal-sw span {
  font-size: 9px; letter-spacing: 0.05em;
  color: rgba(255,255,255,0.9); text-shadow: 0 1px 2px rgba(0,0,0,0.5);
  background: rgba(0,0,0,0.35); padding: 2px 6px; border-radius: 4px;
}

.shots-bar { display: flex; flex-direction: column; gap: 10px; }
.sb-item { }
.sb-lab { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; font-weight: 500; }
.sb-bar { height: 6px; background: var(--bg-sunken); border-radius: 4px; overflow: hidden; }
.sb-bar > span { display: block; height: 100%; border-radius: 4px; }

.music-line { display: flex; gap: 30px; }

.advice { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
.advice li {
  display: grid; grid-template-columns: 28px 1fr; gap: 10px;
  font-size: 13px; line-height: 1.55;
}
.ad-n { color: var(--ink-3); font-size: 11px; padding-top: 3px; }

/* Compare */
.cmp-stage {
  display: grid; grid-template-columns: 1fr auto 1fr; gap: 16px;
  margin-bottom: 16px; align-items: stretch;
}
.cmp-img {
  background: var(--bg-elev); border: 1px solid var(--line);
  border-radius: var(--radius); overflow: hidden; position: relative;
}
.cmp-img img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
.cmp-label {
  position: absolute; top: 12px; left: 12px;
  padding: 4px 10px; background: rgba(0,0,0,0.7); color: #fff;
  border-radius: 99px; font-size: 11px; font-weight: 600;
}
.cmp-foot { padding: 10px 14px; font-size: 11px; color: var(--ink-3); border-top: 1px solid var(--line); }

.cmp-score {
  position: relative; background: var(--bg-elev); border: 1px solid var(--line);
  border-radius: var(--radius); padding: 20px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-width: 160px;
}
.cmp-num { font-size: 72px; line-height: 1; margin: 4px 0; }
.cmp-ring { position: absolute; inset: 0; display: grid; place-items: center; pointer-events: none; }
.cmp-ring svg { width: 180px; height: 180px; }

.cmp-split { display: grid; grid-template-columns: 1.3fr 1fr; gap: 14px; }
.cmp-panel { background: var(--bg-elev); border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; }
.cmp-deltas { padding: 10px 18px 18px; display: flex; flex-direction: column; gap: 14px; }
.cmp-delta { }
.cd-l { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
.cd-dim { font-size: 13px; font-weight: 600; }
.cd-pct { font-size: 14px; font-weight: 700; }
.cd-bar { height: 5px; background: var(--bg-sunken); border-radius: 4px; overflow: hidden; }
.cd-bar > span { display: block; height: 100%; border-radius: 4px; }
.cd-note { font-size: 12px; color: var(--ink-3); margin-top: 5px; }

/* Version history */
.ver-split { display: grid; grid-template-columns: 360px 1fr; gap: 16px; }
.ver-timeline { display: flex; flex-direction: column; gap: 0; }
.ver-node {
  position: relative; display: grid; grid-template-columns: 30px 1fr;
  padding: 14px 12px 14px 0; cursor: pointer;
  border-radius: 10px;
}
.ver-node[data-active="true"] { background: var(--bg-sunken); }
.vn-dot {
  position: relative; z-index: 2;
  width: 14px; height: 14px; border-radius: 99px;
  background: var(--bg-elev); border: 2px solid var(--ink-4);
  margin: 4px 8px 0;
}
.vn-dot[data-active="true"] { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 0 4px rgba(255,77,126,0.15); }
.vn-line {
  position: absolute; top: 22px; left: 15px; bottom: -6px;
  width: 2px; background: var(--line-strong);
}
.vn-body { min-width: 0; }
.vn-v { display: flex; align-items: baseline; gap: 10px; margin-bottom: 3px; }
.vn-by {
  font-family: var(--mono); font-size: 9px;
  padding: 1px 6px; border-radius: 4px;
}
.vn-by.auto { background: rgba(60,119,251,0.12); color: var(--accent-3); }
.vn-by.you  { background: var(--bg-sunken); color: var(--ink-2); }
.vn-note { font-size: 13px; color: var(--ink-2); margin-top: 5px; line-height: 1.5; }

.ver-view { background: var(--bg-elev); border: 1px solid var(--line); border-radius: var(--radius-lg); padding: 22px 24px; }
.ver-text {
  font-family: var(--mono); font-size: 13px; line-height: 1.7;
  background: var(--bg-sunken); padding: 16px 18px;
  border-radius: 12px; border: 1px solid var(--line);
}

/* Export */
.exp-list { background: var(--bg-elev); border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; }
.exp-row {
  display: grid; grid-template-columns: 40px 40px 1fr 100px 80px;
  align-items: center; gap: 14px;
  padding: 14px 20px; border-bottom: 1px solid var(--line);
  cursor: pointer; transition: background 140ms;
}
.exp-row:last-child { border-bottom: none; }
.exp-row:hover { background: var(--bg-sunken); }
.exp-row[data-on="false"] { opacity: 0.4; }
.exp-chk {
  width: 20px; height: 20px; border-radius: 6px;
  border: 1.5px solid var(--line-strong);
  display: grid; place-items: center;
  color: var(--bg); background: transparent;
}
.exp-row[data-on="true"] .exp-chk { background: var(--ink); border-color: var(--ink); }
.exp-ic {
  width: 32px; height: 32px; border-radius: 8px; background: var(--bg-sunken);
  display: grid; place-items: center; color: var(--ink-2);
}
.exp-nm { display: flex; flex-direction: column; gap: 3px; }
.exp-nm .mono { font-size: 13px; color: var(--ink); font-weight: 500; }
.exp-count, .exp-size { font-size: 11px; color: var(--ink-3); text-align: right; }

.exp-foot {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 14px; padding: 16px 20px;
  background: var(--bg-elev); border: 1px dashed var(--line-strong); border-radius: var(--radius);
}
.exp-path {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 13px; color: var(--ink-2);
}

/* Modal */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  opacity: 0; pointer-events: none; transition: opacity 200ms;
  z-index: 40;
}
.modal-backdrop[data-open="true"] { opacity: 1; pointer-events: auto; }
.modal {
  position: fixed; left: 50%; top: 50%;
  transform: translate(-50%, -48%) scale(0.98);
  width: 720px; max-width: calc(100vw - 40px);
  max-height: calc(100vh - 60px); overflow: auto;
  background: var(--bg-elev); border: 1px solid var(--line);
  border-radius: var(--radius-lg); box-shadow: var(--shadow-lg);
  opacity: 0; pointer-events: none; transition: all 220ms ease;
  z-index: 41;
}
.modal[data-open="true"] {
  opacity: 1; pointer-events: auto;
  transform: translate(-50%, -50%) scale(1);
}
.m-head {
  display: flex; align-items: flex-start; justify-content: space-between;
  padding: 22px 24px; border-bottom: 1px solid var(--line);
}
.m-body { padding: 22px 24px; display: flex; flex-direction: column; gap: 24px; }
.m-section { }
.m-foot {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 24px; border-top: 1px solid var(--line);
  background: var(--bg-sunken);
  border-radius: 0 0 var(--radius-lg) var(--radius-lg);
}

.type-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.type-card {
  display: flex; flex-direction: column; gap: 6px;
  padding: 16px 14px; background: var(--bg-sunken);
  border: 1.5px solid transparent; border-radius: 14px;
  transition: all 140ms ease; color: var(--ink-3);
  align-items: flex-start;
}
.type-card[data-active="true"] {
  background: var(--bg-elev); border-color: var(--ink); color: var(--ink);
  box-shadow: var(--shadow-sm);
}
.type-card:hover:not([data-active="true"]) { color: var(--ink); }
.tc-l { font-size: 14px; font-weight: 600; }
.tc-en { font-size: 10px; color: var(--ink-3); letter-spacing: 0.05em; }

.task-chips { display: flex; gap: 8px; flex-wrap: wrap; }
.task-chip {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 14px; border-radius: 99px;
  background: var(--bg-sunken); border: 1px solid var(--line);
  font-size: 13px; color: var(--ink-2); transition: all 140ms;
}
.task-chip[data-on="true"] {
  background: var(--ink); color: var(--bg); border-color: var(--ink);
}
.tc-box {
  width: 16px; height: 16px; border-radius: 4px;
  border: 1.5px solid var(--line-strong);
  display: grid; place-items: center; color: var(--bg);
}
.task-chip[data-on="true"] .tc-box { background: var(--bg); border-color: var(--bg); color: var(--ink); }

/* ═══════════════════════════════════════════
   Phase 3B — 跨工作空间检索 (Knowledge Search)
   ═══════════════════════════════════════════ */

/* ─── 全局检索页 ─── */
.ks-wrap {
  max-width: 1080px;
  margin: 0 auto;
  padding: 40px 32px 96px;
}

.ks-hero { padding-bottom: 8px; }

.ks-eyebrow {
  display: inline-flex; align-items: center; gap: 10px;
  margin-bottom: 18px;
}
.ks-eyebrow-tag {
  display: inline-block;
  padding: 2px 7px;
  border-radius: 4px;
  background: var(--ink);
  color: var(--bg);
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: 0.12em;
  font-weight: 600;
}

.ks-h1 {
  font-size: clamp(48px, 6vw, 80px);
  line-height: 1.02;
  margin: 0 0 22px;
  max-width: 940px;
}
.ks-h1 .ks-accent {
  font-style: italic;
  background: linear-gradient(120deg, var(--accent), var(--accent-2) 60%, var(--accent-3));
  -webkit-background-clip: text; background-clip: text;
  color: transparent;
  padding: 0 0.08em;
}

.ks-lede {
  font-size: 16px;
  line-height: 1.6;
  color: var(--ink-2);
  max-width: 640px;
  margin: 0 0 32px;
}

/* ─── Composer ─── */
.ks-composer {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md);
  overflow: hidden;
  transition: box-shadow 200ms ease, border-color 200ms ease;
}
.ks-composer[data-state="exec"] {
  border-color: var(--accent);
  box-shadow: 0 0 0 4px rgba(255,77,126,0.08), var(--shadow-md);
}
[data-accent="lime"] .ks-composer[data-state="exec"] {
  border-color: var(--accent-green);
  box-shadow: 0 0 0 4px rgba(34,211,154,0.10), var(--shadow-md);
}

.ks-input-row {
  display: flex; align-items: center; gap: 12px;
  padding: 22px 24px;
  border-bottom: 1px solid var(--line);
}
.ks-input-ic {
  width: 36px; height: 36px;
  display: grid; place-items: center;
  color: var(--ink-3);
  flex-shrink: 0;
}
.ks-input-row input {
  flex: 1; min-width: 0;
  font-size: 20px;
  background: transparent;
  border: none; outline: none;
  color: var(--ink);
  font-family: var(--sans);
}
.ks-input-row input::placeholder { color: var(--ink-4); }
.ks-clear {
  width: 28px; height: 28px;
  border-radius: 99px;
  display: grid; place-items: center;
  background: var(--bg-sunken);
  color: var(--ink-3);
  flex-shrink: 0;
  transition: all 140ms;
}
.ks-clear:hover { background: var(--line-strong); color: var(--ink); }

/* Scope picker */
.ks-scope { position: relative; flex-shrink: 0; }
.ks-scope-btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 9px 12px;
  border-radius: 10px;
  background: var(--bg-sunken);
  border: 1px solid var(--line);
  font-size: 13px;
  font-weight: 500;
  color: var(--ink);
  transition: all 140ms;
}
.ks-scope-btn:hover { background: var(--bg); border-color: var(--line-strong); }
.ks-scope-name { max-width: 220px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ks-scope-n {
  font-size: 11px;
  color: var(--ink-3);
  padding: 1px 6px;
  background: var(--bg);
  border-radius: 4px;
}

.ks-scope-menu {
  position: absolute;
  top: calc(100% + 6px);
  right: 0;
  min-width: 320px;
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: 14px;
  box-shadow: var(--shadow-lg);
  padding: 6px;
  z-index: 30;
  animation: ks-menu-in 160ms cubic-bezier(0.2,0.8,0.2,1);
}
@keyframes ks-menu-in { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
.ks-scope-opt {
  display: flex; align-items: center; gap: 10px;
  width: 100%;
  padding: 9px 12px;
  border-radius: 10px;
  font-size: 13px;
  color: var(--ink);
  text-align: left;
}
.ks-scope-opt > span:not(.ks-scope-n):not(.ks-scope-dot) { flex: 1; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ks-scope-opt:hover { background: var(--bg-sunken); }
.ks-scope-opt[data-active="true"] { background: var(--ink); color: var(--bg); }
.ks-scope-opt[data-active="true"] .ks-scope-n { background: var(--bg); color: var(--ink); }
.ks-scope-dot {
  width: 8px; height: 8px; border-radius: 99px;
  background: var(--line-strong);
  flex-shrink: 0;
}
.ks-scope-dot[data-current="true"] {
  background: var(--accent-green);
  box-shadow: 0 0 0 2px rgba(34,211,154,0.18);
}
.ks-scope-sep { height: 1px; background: var(--line); margin: 4px 8px; }

.ks-foot {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px 14px 24px;
  background: var(--bg-sunken);
}
.ks-foot-l {
  display: flex; align-items: center; gap: 10px;
  font-size: 12px;
}
.ks-foot-hint { color: var(--ink-3); }
.ks-foot-dot { color: var(--ink-4); }
.btn-run[disabled] { opacity: 0.45; cursor: not-allowed; }

/* Recent queries */
.ks-recent { margin-top: 24px; }
.ks-recent-label { display: block; margin-bottom: 10px; }
.ks-recent-chips {
  display: flex; flex-wrap: wrap; gap: 8px;
}
.ks-recent-chip {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 7px 12px;
  border-radius: 99px;
  background: var(--bg-elev);
  border: 1px solid var(--line);
  font-size: 13px;
  color: var(--ink-2);
  transition: all 140ms;
}
.ks-recent-chip:hover {
  border-color: var(--ink); color: var(--ink);
  transform: translateY(-1px);
}
.ks-recent-chip svg { color: var(--ink-4); }
.ks-recent-chip:hover svg { color: var(--ink); }

/* ─── Section spacing ─── */
.ks-section { margin-top: 40px; }
.ks-section-head {
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 20px;
  margin-bottom: 18px;
  flex-wrap: wrap;
}
.ks-section-hd-l { flex: 1; min-width: 0; }
.ks-section-hd-l .eyebrow { margin-bottom: 8px; }
.ks-section-hd-r { display: flex; gap: 8px; flex-wrap: wrap; flex-shrink: 0; }
.ks-section-title {
  font-size: 40px;
  line-height: 1.05;
  margin: 0;
  letter-spacing: -0.01em;
}

/* ─── Executing block ─── */
.ks-exec-wrap {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 24px 28px;
}
.ks-exec { display: flex; flex-direction: column; gap: 4px; }
.ks-exec-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0;
  font-size: 13.5px;
}
.ks-exec-ic {
  width: 22px; height: 22px;
  border-radius: 6px;
  background: var(--bg-sunken);
  display: grid; place-items: center;
  color: var(--ink-3);
  flex-shrink: 0;
  transition: all 200ms;
}
.ks-exec-row[data-state="running"] .ks-exec-ic { background: var(--ink); color: var(--bg); }
.ks-exec-row[data-state="done"] .ks-exec-ic { background: var(--accent-green); color: #fff; }
.ks-exec-row[data-state="queued"] { opacity: 0.45; }
.ks-exec-row[data-state="queued"] .ks-exec-dot {
  width: 6px; height: 6px; border-radius: 99px; background: var(--ink-4);
}
.ks-exec-label { color: var(--ink-2); }
.ks-exec-row[data-state="done"] .ks-exec-label { color: var(--ink); }
.ks-exec-dots { display: inline-flex; gap: 2px; color: var(--ink-3); margin-left: 4px; }

/* ─── Answer card ─── */
.ks-answer-card {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  overflow: hidden;
  position: relative;
}
.ks-answer-card::before {
  content: '';
  position: absolute;
  top: -120px; right: -120px;
  width: 360px; height: 360px; border-radius: 50%;
  background: radial-gradient(circle, var(--accent) 0%, transparent 60%);
  opacity: 0.06;
  pointer-events: none;
}
.ks-answer-body {
  padding: 30px 36px 18px;
  position: relative;
  font-size: 14.5px;
  line-height: 1.7;
}
.ks-answer-body h3 {
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 600;
  margin: 22px 0 8px;
  color: var(--ink);
  letter-spacing: -0.005em;
}
.ks-answer-body h3:first-child { margin-top: 0; }
.ks-answer-body p { margin: 0 0 12px; color: var(--ink); }
.ks-answer-body p:last-child { margin-bottom: 0; }
.ks-answer-body blockquote {
  margin: 18px 0 6px;
  padding: 14px 18px;
  background: var(--bg-sunken);
  border-left: 3px solid var(--accent);
  border-radius: 0 12px 12px 0;
  font-size: 14px;
  color: var(--ink);
}
[data-accent="lime"] .ks-answer-body blockquote { border-left-color: var(--accent-green); }
.ks-answer-body ul { margin: 6px 0 14px; padding-left: 22px; }
.ks-answer-body li { margin: 4px 0; }
.ks-answer-body strong { font-weight: 600; color: var(--ink); }

/* Inline citation pill */
.ks-cite {
  display: inline-grid; place-items: center;
  min-width: 18px; height: 18px;
  padding: 0 5px;
  margin: 0 1px;
  border-radius: 5px;
  background: var(--ink);
  color: var(--bg);
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  vertical-align: 1px;
  transition: all 140ms;
  border: 1px solid var(--ink);
}
.ks-cite:hover {
  transform: translateY(-1px);
  background: var(--accent);
  border-color: var(--accent);
}
[data-accent="lime"] .ks-cite:hover { background: var(--accent-green); border-color: var(--accent-green); color: #fff; }

.ks-answer-foot {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 24px 14px 36px;
  border-top: 1px solid var(--line);
  background: var(--bg-sunken);
  gap: 12px;
  flex-wrap: wrap;
}
.ks-answer-foot-l { display: flex; gap: 14px; align-items: center; }
.ks-answer-model { font-size: 11px; color: var(--ink-3); letter-spacing: 0.04em; }
.ks-answer-foot-r { display: flex; gap: 4px; flex-wrap: wrap; }
.ks-answer-foot-r .btn { height: 30px; padding: 0 10px; font-size: 12px; }

/* Followups */
.ks-followups {
  margin-top: 22px;
}
.ks-followup-label { display: block; margin-bottom: 10px; }
.ks-followup-list { display: flex; flex-direction: column; gap: 6px; }
.ks-followup {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 18px;
  background: var(--bg-elev);
  border: 1px dashed var(--line-strong);
  border-radius: 14px;
  font-size: 14px;
  color: var(--ink);
  text-align: left;
  gap: 14px;
  transition: all 140ms;
}
.ks-followup:hover {
  border-style: solid;
  border-color: var(--ink);
  background: var(--bg-elev);
  transform: translateX(2px);
}
.ks-followup svg { color: var(--ink-4); flex-shrink: 0; }
.ks-followup:hover svg { color: var(--ink); }

/* ─── Source cards ─── */
.ks-src-list { display: flex; flex-direction: column; gap: 10px; }
.ks-src {
  display: grid;
  grid-template-columns: 40px 152px 1fr 156px;
  gap: 18px;
  padding: 16px 20px 16px 16px;
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  align-items: stretch;
  transition: all 180ms;
  scroll-margin-top: 80px;
}
.ks-src:hover {
  border-color: var(--line-strong);
  box-shadow: var(--shadow-sm);
  transform: translateY(-1px);
}
.ks-src[data-flash="true"] {
  border-color: var(--accent);
  background: linear-gradient(90deg, rgba(255,77,126,0.07), transparent 80%);
  animation: ks-src-flash 1.5s ease-out;
}
[data-accent="lime"] .ks-src[data-flash="true"] {
  border-color: var(--accent-green);
  background: linear-gradient(90deg, rgba(34,211,154,0.10), transparent 80%);
}
@keyframes ks-src-flash {
  0% { box-shadow: 0 0 0 0 var(--accent); }
  20% { box-shadow: 0 0 0 6px rgba(255,77,126,0.18); }
  100% { box-shadow: 0 0 0 0 rgba(255,77,126,0); }
}

.ks-src-idx {
  font-family: var(--display);
  font-size: 36px;
  line-height: 1;
  color: var(--ink-4);
  display: flex; align-items: flex-start;
  padding-top: 4px;
  font-style: italic;
  user-select: none;
}
.ks-src[data-flash="true"] .ks-src-idx { color: var(--accent); }
[data-accent="lime"] .ks-src[data-flash="true"] .ks-src-idx { color: var(--accent-green); }

.ks-src-thumb {
  position: relative;
  border-radius: 10px;
  overflow: hidden;
  aspect-ratio: 16/9;
  background: #000;
  align-self: center;
}
.ks-src-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.ks-src-type {
  position: absolute; top: 6px; left: 6px;
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 7px;
  border-radius: 99px;
  background: rgba(0,0,0,0.7);
  color: #fff;
  font-size: 9.5px;
  font-weight: 600;
  letter-spacing: 0.02em;
}
.ks-src-type[data-tone="pink"]   { background: var(--accent); }
.ks-src-type[data-tone="purple"] { background: var(--accent-2); }
.ks-src-type[data-tone="blue"]   { background: var(--accent-3); }
.ks-src-type[data-tone="amber"]  { background: var(--accent-warm); color: #1a1000; }

.ks-src-body { min-width: 0; display: flex; flex-direction: column; gap: 5px; }
.ks-src-ws {
  display: flex; align-items: center; gap: 6px;
  font-size: 11.5px;
  color: var(--ink-3);
  margin-bottom: 2px;
}
.ks-src-ws svg { color: var(--ink-4); flex-shrink: 0; }
.ks-src-ws-name {
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 280px;
}
.ks-src-slash { color: var(--ink-4); }
.ks-src-item { font-size: 10.5px; }
.ks-src-ts { font-size: 10.5px; }

.ks-src-title {
  font-size: 15px;
  font-weight: 600;
  line-height: 1.35;
  color: var(--ink);
  margin-bottom: 4px;
  display: -webkit-box;
  -webkit-line-clamp: 1;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.ks-src-excerpt {
  font-size: 13px;
  line-height: 1.55;
  color: var(--ink-2);
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.ks-src-quote {
  font-family: var(--display);
  font-size: 18px;
  color: var(--ink-4);
  line-height: 0;
  vertical-align: -4px;
  margin-right: 2px;
}
.ks-src-quote:last-child { margin-left: 2px; margin-right: 0; }

.ks-src-meta {
  display: flex; flex-direction: column; justify-content: space-between;
  align-items: flex-end;
  gap: 8px;
  flex-shrink: 0;
}
.ks-src-score {
  text-align: right;
  min-width: 90px;
}
.ks-score-num {
  font-family: var(--display);
  font-size: 26px;
  line-height: 1;
  color: var(--ink);
  font-weight: 400;
  letter-spacing: -0.01em;
}
.ks-score-label {
  font-size: 9.5px;
  letter-spacing: 0.14em;
  color: var(--ink-4);
  text-transform: uppercase;
  margin-top: 2px;
}
.ks-score-bar {
  margin-top: 6px;
  height: 3px;
  width: 90px;
  background: var(--bg-sunken);
  border-radius: 99px;
  overflow: hidden;
}
.ks-score-bar > span {
  display: block; height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent-2));
  border-radius: 99px;
}
[data-accent="lime"] .ks-score-bar > span {
  background: linear-gradient(90deg, var(--accent-green), var(--accent-3));
}
.ks-src-jump {
  height: 30px; padding: 0 10px;
  font-size: 12px;
}

/* ─── 工作空间内嵌检索栏 ─── */
.ws-search {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  margin-bottom: 18px;
  overflow: hidden;
  transition: box-shadow 200ms ease, border-color 200ms ease;
}
.ws-search[data-open="true"] {
  box-shadow: var(--shadow-md);
}
.ws-search-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px 10px 16px;
}
.ws-search-ic { color: var(--ink-3); display: grid; place-items: center; }
.ws-search-bar input {
  flex: 1; min-width: 0;
  font-size: 14px;
  background: transparent;
  border: none; outline: none;
}
.ws-search-bar input::placeholder { color: var(--ink-4); }
.ws-search-scope {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 10px;
  background: var(--bg-sunken);
  border-radius: 99px;
  font-size: 11px;
  color: var(--ink-2);
  font-weight: 500;
  flex-shrink: 0;
  letter-spacing: 0.02em;
}
.ws-search-scope svg { color: var(--ink-3); }
.ws-search-clear {
  width: 24px; height: 24px; border-radius: 6px;
  display: grid; place-items: center;
  color: var(--ink-3);
  background: transparent;
}
.ws-search-clear:hover { background: var(--bg-sunken); color: var(--ink); }
.ws-search-go { height: 32px; padding: 0 14px; font-size: 12.5px; }
.ws-search-go[disabled] { opacity: 0.45; cursor: not-allowed; }

.ws-search-panel {
  border-top: 1px solid var(--line);
  background: var(--bg-sunken);
  animation: ks-menu-in 200ms cubic-bezier(0.2,0.8,0.2,1);
}

.ws-search-exec {
  display: flex; align-items: center; gap: 10px;
  padding: 18px 20px;
  font-size: 12px;
  color: var(--ink-3);
}

.ws-search-summary {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 18px;
  border-bottom: 1px solid var(--line);
  font-size: 11px;
  color: var(--ink-3);
}
.ws-search-summary .mono { font-size: 11px; }
.ws-search-summary-spacer { flex: 1; }
.ws-search-summary .btn { height: 26px; padding: 0 8px; font-size: 11px; }

.ws-search-results {
  display: flex; flex-direction: column;
}
.ws-result {
  display: grid;
  grid-template-columns: 110px 1fr 130px;
  gap: 14px;
  padding: 12px 18px;
  border-bottom: 1px solid var(--line);
  align-items: center;
  transition: background 140ms;
}
.ws-result:hover { background: var(--bg-elev); }
.ws-result:last-child { border-bottom: none; }
.ws-result-l {
  display: flex; flex-direction: column; gap: 5px; align-items: flex-start;
}
.ws-result-type {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 7px;
  border-radius: 99px;
  background: var(--ink);
  color: var(--bg);
  font-size: 9.5px;
  font-weight: 600;
}
.ws-result-type[data-tone="pink"]   { background: var(--accent); color: #fff; }
.ws-result-type[data-tone="purple"] { background: var(--accent-2); color: #fff; }
.ws-result-type[data-tone="blue"]   { background: var(--accent-3); color: #fff; }
.ws-result-type[data-tone="amber"]  { background: var(--accent-warm); color: #1a1000; }
.ws-result-ts { font-size: 10.5px; color: var(--ink-3); }
.ws-result-body { min-width: 0; }
.ws-result-title {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 4px;
  color: var(--ink);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.ws-result-excerpt {
  font-size: 12px;
  color: var(--ink-2);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.ws-result-r {
  display: flex; align-items: center; gap: 8px;
  justify-content: flex-end;
}
.ws-result-score {
  font-family: var(--display);
  font-size: 18px;
  color: var(--ink);
  line-height: 1;
}
.ws-result-jump {
  width: 30px; height: 30px;
  padding: 0;
  display: grid; place-items: center;
  border-radius: 99px;
}
.ws-result-jump:hover { background: var(--ink); color: var(--bg); }

.ws-search-cta {
  display: flex; align-items: center; justify-content: space-between;
  gap: 14px;
  padding: 12px 18px;
  background: var(--bg-elev);
  border-top: 1px dashed var(--line-strong);
  flex-wrap: wrap;
}
.ws-search-cta .btn { height: 32px; }

/* ─── Dark mode polish ─── */
[data-theme="dark"] .ks-src[data-flash="true"] {
  background: linear-gradient(90deg, rgba(255,77,126,0.12), transparent 80%);
}
[data-theme="dark"][data-accent="lime"] .ks-src[data-flash="true"] {
  background: linear-gradient(90deg, rgba(34,211,154,0.14), transparent 80%);
}
[data-theme="dark"] .ks-cite { background: var(--ink); color: var(--bg); border-color: var(--ink); }

/* ═══════════════════════════════════════════
   Phase 3C — 7 维度标签库
   ═══════════════════════════════════════════ */

/* ─── ItemTagsPanel (4 个 result 详情页顶部) ─── */
.it-panel {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 14px 18px;
  position: relative;
  transition: opacity 200ms ease;
}
.it-panel[data-regen="true"] { opacity: 0.7; }
.it-panel[data-compact="true"] { padding: 12px 16px; }

.it-host {
  border-bottom: 1px solid var(--line);
  padding-bottom: 12px !important;
}

.it-head {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 14px;
  margin-bottom: 10px;
}
.it-head-l { flex: 1; min-width: 0; }
.it-eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  margin-bottom: 6px;
}
.it-eyebrow .ks-eyebrow-tag {
  background: var(--bg-sunken);
  color: var(--ink-3);
  font-size: 9px;
  border: 1px solid var(--line);
}
.it-meta {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  font-size: 11px; color: var(--ink-3);
}
.it-meta-dot { color: var(--ink-4); }
.it-meta-model { font-size: 10.5px; color: var(--ink-3); }

.it-regen {
  height: 30px; padding: 0 12px;
  font-size: 12px; flex-shrink: 0;
  display: inline-flex; align-items: center; gap: 6px;
}
.it-regen[disabled] {
  opacity: 0.6; cursor: wait;
}

/* Badge grid */
.it-badges {
  display: flex; flex-wrap: wrap;
  gap: 6px 8px;
  align-items: center;
}
.it-badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 11px;
  background: var(--bg-sunken);
  border: 1px solid var(--line);
  border-radius: 99px;
  font-size: 12.5px;
  color: var(--ink);
  transition: all 140ms;
}
.it-badge:hover { border-color: var(--line-strong); }
.it-badge-k {
  font-size: 9.5px;
  letter-spacing: 0.08em;
  color: var(--ink-3);
  text-transform: uppercase;
}
.it-badge-sep { color: var(--ink-4); }
.it-badge-v { font-weight: 500; }

.it-badge[data-tone="pink"]   .it-badge-k { color: var(--accent); }
.it-badge[data-tone="purple"] .it-badge-k { color: var(--accent-2); }
.it-badge[data-tone="blue"]   .it-badge-k { color: var(--accent-3); }
.it-badge[data-tone="amber"]  .it-badge-k { color: #C68A1C; }
.it-badge[data-tone="green"]  .it-badge-k { color: #1AA77A; }
.it-badge[data-tone="mono"]   .it-badge-k { color: var(--ink-3); }
[data-accent="lime"] .it-badge[data-tone="pink"]   .it-badge-k { color: var(--accent-green); }
[data-accent="lime"] .it-badge[data-tone="green"]  .it-badge-k { color: var(--accent-3); }

.it-badge-divider {
  height: 16px; width: 1px;
  background: var(--line-strong);
  margin: 0 4px;
}

.it-badge-custom {
  background: rgba(255,77,126,0.06);
  border-color: rgba(255,77,126,0.18);
  color: var(--ink);
  border-style: dashed;
}
[data-accent="lime"] .it-badge-custom {
  background: rgba(34,211,154,0.07);
  border-color: rgba(34,211,154,0.22);
}
.it-badge-hash {
  font-family: var(--mono);
  color: var(--accent);
  font-weight: 600;
  font-size: 12px;
}
[data-accent="lime"] .it-badge-hash { color: var(--accent-green); }
.it-badge-custom:hover { background: rgba(255,77,126,0.10); }
[data-accent="lime"] .it-badge-custom:hover { background: rgba(34,211,154,0.11); }

/* Empty state */
.it-panel.it-empty .it-empty-strip {
  display: flex; flex-wrap: wrap; gap: 6px 8px; opacity: 0.5;
}
.it-badge-skel {
  background: repeating-linear-gradient(
    100deg,
    var(--bg-sunken) 0,
    var(--bg-sunken) 8px,
    var(--bg) 8px,
    var(--bg) 16px
  );
}

/* Toast */
.it-toast {
  position: absolute;
  top: 12px; right: 12px;
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 11px;
  background: var(--accent-green);
  color: #fff;
  border-radius: 99px;
  font-size: 11.5px;
  font-weight: 600;
  animation: it-toast-in 200ms cubic-bezier(0.2,0.8,0.2,1);
  box-shadow: 0 4px 12px rgba(34,211,154,0.3);
}
@keyframes it-toast-in {
  from { opacity: 0; transform: translateY(-4px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ─── WorkspaceTagFilter (drawer 顶部) ─── */
.d-filter {
  padding: 12px 14px 14px;
  border-bottom: 1px solid var(--line);
  background: var(--bg);
}
.tf-wrap {
  display: flex; flex-direction: column;
  gap: 8px;
}
.tf-row {
  display: flex; flex-wrap: wrap; gap: 5px;
  align-items: center;
}
.tf-row-2 {
  margin-top: 2px;
  gap: 6px;
}

.tf-chip-wrap { position: relative; }
.tf-chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 9px 5px 10px;
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: 99px;
  font-size: 11.5px;
  color: var(--ink-2);
  transition: all 140ms;
  white-space: nowrap;
  font-weight: 500;
}
.tf-chip:hover { border-color: var(--line-strong); color: var(--ink); }
.tf-chip[data-open="true"] {
  background: var(--bg-sunken);
  border-color: var(--line-strong);
}
.tf-chip[data-on="true"] {
  background: var(--ink);
  border-color: var(--ink);
  color: var(--bg);
}
.tf-chip[data-on="true"][data-tone="pink"]   { background: var(--accent);       border-color: var(--accent);       color: #fff; }
.tf-chip[data-on="true"][data-tone="purple"] { background: var(--accent-2);     border-color: var(--accent-2);     color: #fff; }
.tf-chip[data-on="true"][data-tone="blue"]   { background: var(--accent-3);     border-color: var(--accent-3);     color: #fff; }
.tf-chip[data-on="true"][data-tone="amber"]  { background: var(--accent-warm);  border-color: var(--accent-warm);  color: #1a1000; }
.tf-chip[data-on="true"][data-tone="green"]  { background: var(--accent-green); border-color: var(--accent-green); color: #fff; }
.tf-chip[data-on="true"][data-tone="mono"]   { background: var(--ink);          border-color: var(--ink);          color: var(--bg); }
.tf-chip-caret { color: currentColor; opacity: 0.55; transition: transform 160ms; flex-shrink: 0; }
.tf-chip[data-open="true"] .tf-chip-caret { transform: rotate(180deg); }
.tf-chip-label {
  max-width: 130px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

.tf-pop {
  position: absolute;
  top: calc(100% + 6px); left: 0;
  min-width: 180px;
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: 12px;
  box-shadow: var(--shadow-lg);
  padding: 6px;
  z-index: 50;
  animation: ks-menu-in 140ms cubic-bezier(0.2,0.8,0.2,1);
}
.tf-pop-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 4px 8px 6px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 4px;
}
.tf-pop-head .eyebrow { font-size: 9.5px; }
.tf-pop-clear {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--ink-3);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.tf-pop-clear:hover { color: var(--ink); }

.tf-pop-body { display: flex; flex-direction: column; gap: 1px; }
.tf-opt {
  display: flex; align-items: center; gap: 9px;
  padding: 7px 10px;
  border-radius: 8px;
  font-size: 13px;
  color: var(--ink);
  text-align: left;
  width: 100%;
}
.tf-opt:hover { background: var(--bg-sunken); }
.tf-opt-box {
  width: 16px; height: 16px;
  border-radius: 5px;
  border: 1.5px solid var(--line-strong);
  display: grid; place-items: center;
  color: var(--bg);
  flex-shrink: 0;
}
.tf-opt[data-on="true"] .tf-opt-box {
  background: var(--ink);
  border-color: var(--ink);
}
.tf-opt[data-on="true"] { font-weight: 500; }

/* custom input row */
.tf-custom {
  flex: 1; min-width: 160px;
  display: flex; align-items: center; gap: 5px;
  padding: 5px 10px 5px 11px;
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: 99px;
}
.tf-custom:focus-within { border-color: var(--line-strong); }
.tf-custom-hash {
  color: var(--accent);
  font-family: var(--mono);
  font-weight: 600;
  font-size: 12px;
}
[data-accent="lime"] .tf-custom-hash { color: var(--accent-green); }
.tf-custom input {
  flex: 1; min-width: 0;
  background: transparent;
  border: none; outline: none;
  font-size: 12px;
  color: var(--ink);
}
.tf-custom input::placeholder { color: var(--ink-4); }
.tf-custom-x {
  width: 18px; height: 18px;
  border-radius: 4px;
  display: grid; place-items: center;
  color: var(--ink-3);
}
.tf-custom-x:hover { background: var(--bg-sunken); color: var(--ink); }

.tf-row2-spacer { flex: 1; }
.tf-match-meta {
  font-size: 10.5px;
  color: var(--ink-3);
  letter-spacing: 0.04em;
}
.tf-clear {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 5px 9px;
  border-radius: 99px;
  background: var(--ink);
  color: var(--bg);
  font-size: 11px;
  font-weight: 500;
  transition: all 140ms;
}
.tf-clear:hover { background: var(--ink-2); }

/* ─── TaskTagPreview (drawer 内每行底部追加) ─── */
.ttp-row {
  display: flex; flex-wrap: wrap; gap: 3px 4px;
  margin-top: 6px;
}
.ttp-chip {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 2px 6px;
  border-radius: 5px;
  background: var(--bg-sunken);
  border: 1px solid transparent;
  font-size: 10.5px;
  color: var(--ink-2);
  transition: all 140ms;
}
.ttp-chip-k {
  font-size: 8.5px;
  letter-spacing: 0.08em;
  color: var(--ink-4);
  text-transform: uppercase;
}
.ttp-chip-v { font-weight: 500; }
.ttp-chip-custom {
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--ink-3);
  letter-spacing: 0.02em;
}
.ttp-chip[data-hit="true"] {
  background: var(--ink);
  color: var(--bg);
  border-color: var(--ink);
}
.ttp-chip[data-hit="true"] .ttp-chip-k { color: rgba(255,255,255,0.6); }
.ttp-progress {
  margin-left: auto;
  font-size: 9.5px;
  color: var(--ink-4);
  padding: 2px 0 0 4px;
}

/* drawer empty state */
.d-empty {
  padding: 40px 24px;
  text-align: center;
  color: var(--ink-3);
  display: flex; flex-direction: column;
  gap: 8px;
  align-items: center;
}
.d-empty-h { font-size: 14px; font-weight: 600; color: var(--ink); }
.d-empty-s { font-size: 12px; line-height: 1.5; max-width: 280px; }
.d-empty .btn { margin-top: 6px; }

/* ── §16.4 Density Scale ── */
:root[data-density="compact"] { --d-card-pad: 0.85; --d-line-h: 0.92; }
:root[data-density="cozy"]    { --d-card-pad: 1.00; --d-line-h: 1.00; }
:root[data-density="roomy"]   { --d-card-pad: 1.15; --d-line-h: 1.08; }
:root[data-density="roomy"] .mat-card .mat-body { padding: 17px 19px; }
:root[data-density="roomy"] .stage    { padding: 17px 24px; }
:root[data-density="compact"] .mat-card .mat-body { padding: 11px 13px; }
:root[data-density="compact"] .stage  { padding: 11px 16px; }

/* ── §2.3 Material card · top 4px color stripe by type ── */
.mat-card { position: relative; }
.mat-card[data-type]::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 4px;
  border-radius: var(--radius) var(--radius) 0 0;
  z-index: 2; pointer-events: none;
}
.mat-card[data-type="video"]::before { background: var(--accent-2); }
.mat-card[data-type="audio"]::before { background: var(--accent-green); }
.mat-card[data-type="image"]::before { background: var(--accent-3); }
.mat-card[data-type="text"]::before  { background: var(--ink-3); }
.mat-card.mat-add::before { display: none; }
.mat-card .mat-thumb { border-radius: 0; }

/* ── §3.2 Export-source green button ── */
.btn-export-src {
  display: inline-flex; align-items: center; gap: 6px;
  height: 28px; padding: 0 12px; border-radius: 99px;
  background: rgba(34,211,154,0.10);
  border: 1px solid rgba(34,211,154,0.38);
  color: var(--accent-green); font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all 140ms ease; flex-shrink: 0;
  font-family: var(--sans);
}
.btn-export-src:hover {
  background: var(--accent-green); color: #fff;
  border-color: var(--accent-green);
}
.btn-export-src svg { flex-shrink: 0; }
.btn-export-src .esrc-dot {
  width: 6px; height: 6px; border-radius: 99px;
  background: var(--accent-green);
  box-shadow: 0 0 0 2px rgba(34,211,154,0.25);
}
.btn-export-src:hover .esrc-dot { background: #fff; box-shadow: 0 0 0 2px rgba(255,255,255,0.35); }

/* ── §3.1 Multi-URL stack ── */
.composer-url[data-multi="true"] {
  flex-direction: column; align-items: stretch; gap: 4px;
}
.composer-url[data-multi="true"] textarea {
  flex: 1; min-height: 78px; max-height: 160px; resize: vertical;
  background: transparent; border: none; outline: none;
  font-family: var(--mono); font-size: 13px; line-height: 1.55;
  color: var(--ink); padding: 4px 0;
  width: 100%;
}
.composer-url[data-multi="true"] textarea::placeholder { color: var(--ink-4); }
.composer-multi-bar {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  padding-top: 8px; border-top: 1px dashed var(--line);
  font-size: 11px; color: var(--ink-3); margin-top: 4px;
}
.composer-multi-bar .url-count {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 9px; border-radius: 99px;
  background: var(--ink); color: var(--bg);
  font-family: var(--mono); font-size: 11px; font-weight: 600;
}
.composer-multi-bar .url-plat {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 9px; border-radius: 99px;
  background: var(--bg-sunken); border: 1px solid var(--line);
  font-size: 11px; color: var(--ink-2);
}
.composer-multi-bar .url-plat-dot {
  width: 6px; height: 6px; border-radius: 99px;
}

/* ─── Phase 4C: header bar with proper flex (audio/text detail) ─── */
.detail-topbar {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 20px; flex-shrink: 0;
  border-bottom: 1px solid var(--line);
  background: var(--bg-elev);
}

/* ── §15.5 Storage rules panel ── */
.storage-rules {
  background: var(--bg-elev); border: 1px solid var(--line);
  border-radius: var(--radius); margin-top: 16px; overflow: hidden;
}
.sr-row {
  display: grid; grid-template-columns: 200px 1fr 130px 90px;
  align-items: center; gap: 18px;
  padding: 18px 22px; border-top: 1px solid var(--line);
}
.sr-row:first-child { border-top: none; }
.sr-row[data-disabled="true"] { opacity: 0.55; }
.sr-name { display: flex; flex-direction: column; gap: 3px; }
.sr-name-t { font-size: 14px; font-weight: 600; color: var(--ink); }
.sr-name-k { font-family: var(--mono); font-size: 10px; color: var(--ink-4);
             letter-spacing: 0.08em; text-transform: uppercase; }
.sr-desc { font-size: 12.5px; color: var(--ink-2); line-height: 1.5; }
.sr-days {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 5px 12px; border-radius: 99px;
  background: var(--bg-sunken); border: 1px solid var(--line);
  font-family: var(--mono); font-size: 13px; color: var(--ink);
  width: fit-content;
}
.sr-days[data-never="true"] { background: rgba(255,77,126,0.08); color: var(--accent); border-color: rgba(255,77,126,0.25); }
.sr-days input {
  width: 38px; background: transparent; border: none; outline: none;
  font: inherit; color: inherit; text-align: center;
}
.sr-toggle {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11px; color: var(--ink-3);
}
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="app"></div>

<script src="components/data.js?v=23"></script>
<script type="text/babel" src="components/icons.jsx"></script>
<script type="text/babel" src="components/shell.jsx"></script>
<script type="text/babel" src="components/search.jsx"></script>
<script type="text/babel" src="components/item_tags.jsx"></script>
<script type="text/babel" src="components/workbench.jsx"></script>
<script type="text/babel" src="components/taskboard.jsx"></script>
<script type="text/babel" src="components/processing.jsx"></script>
<script type="text/babel" src="components/results.jsx"></script>
<script type="text/babel" src="components/storyboard.jsx"></script>
<script type="text/babel" src="components/workspace_card.jsx"></script>
<script type="text/babel" src="components/library.jsx"></script>
<script type="text/babel" src="components/director.jsx"></script>
<script type="text/babel" src="components/settings.jsx"></script>
<script type="text/babel" src="components/task_chat.jsx"></script>
<script type="text/babel" src="components/video_detail.jsx"></script>
<script type="text/babel" src="components/image_detail.jsx"></script>
<script type="text/babel" src="components/audio_detail.jsx"></script>
<script type="text/babel" src="components/text_detail.jsx"></script>
<script type="text/babel" src="components/preflight.jsx"></script>
<script type="text/babel" src="components/errors.jsx"></script>
<script type="text/babel" src="components/p1_features.jsx"></script>
<script type="text/babel" src="components/multi_compare.jsx"></script>
<script type="text/babel" src="components/speaker_confirm.jsx"></script>
<script type="text/babel" src="components/overview.jsx"></script>

<script type="text/babel">
/* ─── App root ─── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "density": "compact",
  "accent": "lime",
  "layout": "stack",
  "lang": "zh",
  "recentMode": "workspaces"
}/*EDITMODE-END*/;

const App = () => {
  const saved = (() => { try { return JSON.parse(localStorage.getItem('vm-state') || '{}'); } catch { return {}; } })();
  const tweaks = (() => { try { return {...TWEAK_DEFAULTS, ...JSON.parse(localStorage.getItem('vm-tweaks')||'{}')}; } catch { return TWEAK_DEFAULTS; } })();

  const [route, setRoute] = React.useState(saved.route || 'home');
  const [theme, setTheme] = React.useState(tweaks.theme);
  const [density, setDensity] = React.useState(tweaks.density);
  const [accent, setAccent] = React.useState(tweaks.accent);
  const [layout, setLayout] = React.useState(tweaks.layout);
  const [lang, setLang] = React.useState(tweaks.lang);
  const [recentMode, setRecentMode] = React.useState(tweaks.recentMode || 'workspaces');
  const [addMatSeed, setAddMatSeed] = React.useState(null);
  const [preflightOpen, setPreflightOpen] = React.useState(false);
  const [preflightSeed, setPreflightSeed] = React.useState(null);
  const [tweaksOpen, setTweaksOpen] = React.useState(false);
  const [tasksOpen, setTasksOpen] = React.useState(false);
  const [activeTask, setActiveTask] = React.useState(VM_DATA.TASKS[0].id);
  const [sbVariant, setSbVariant] = React.useState('A');
  const [addMatOpen, setAddMatOpen] = React.useState(false);
  const [activeMedia, setActiveMedia] = React.useState(null);
  /* §11.3 · 当前 Processing 页正在查看的任务 id (可通过浮动面板切换) */
  const [activeProcId, setActiveProcId] = React.useState(saved.activeProcId || 'm5');
  /* §13 · 未配置模型拦截 */
  const [modelsConfigured, setModelsConfigured] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('vm-models-ok') ?? 'true'); } catch { return true; }
  });
  const [modelMissingOpen, setModelMissingOpen] = React.useState(false);
  React.useEffect(() => { localStorage.setItem('vm-models-ok', JSON.stringify(modelsConfigured)); }, [modelsConfigured]);
  /* §5.1 · 镶头确认中断点 */
  const [shotConfirm, setShotConfirm] = React.useState(null); // { shots, framesPerShot, pendingCfg } | null

  // Simulate processing progress
  const [procProgress, setProcProgress] = React.useState(saved.procProgress ?? 0.42);
  React.useEffect(() => {
    if (route !== 'process') return;
    if (procProgress >= 1) return;
    const t = setInterval(() => setProcProgress(p => Math.min(1, p + 0.004)), 180);
    return () => clearInterval(t);
  }, [route, procProgress]);

  // Auto-advance to results when processing completes
  React.useEffect(() => {
    if (route === 'process' && procProgress >= 1) {
      const t = setTimeout(() => setRoute('results'), 900);
      return () => clearTimeout(t);
    }
  }, [route, procProgress]);

  // Persist
  React.useEffect(() => {
    localStorage.setItem('vm-state', JSON.stringify({ route, procProgress, activeProcId }));
  }, [route, procProgress, activeProcId]);
  React.useEffect(() => {
    const t = {theme, density, accent, layout, lang, recentMode};
    localStorage.setItem('vm-tweaks', JSON.stringify(t));
    window.parent?.postMessage({ type: '__edit_mode_set_keys', edits: t }, '*');
  }, [theme, density, accent, layout, lang, recentMode]);

  // §16.4 — density apply via data attr (CSS scales line-height / card padding)
  React.useEffect(() => {
    // Migrate legacy values: 'comfy' → 'cozy' (spec rename)
    const next = density === 'comfy' ? 'cozy' : density;
    if (next !== density) setDensity(next);
    document.documentElement.setAttribute('data-density', next);
  }, [density]);

  // Apply theme
  React.useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
  }, [theme]);

  // Apply accent
  React.useEffect(() => {
    const map = {
      pink:   ['#FF4D7E','#B84CFF','#3C77FB'],
      sunset: ['#FF6B35','#FF4D7E','#FFB84C'],
      lime:   ['#22D39A','#3C77FB','#7ED957'],
      mono:   ['#444','#666','#888'],
      purple: ['#B84CFF','#7C3AED','#3C77FB'],
    };
    const [a,b,c] = map[accent] || map.pink;
    document.documentElement.style.setProperty('--accent', a);
    document.documentElement.style.setProperty('--accent-2', b);
    document.documentElement.style.setProperty('--accent-3', c);
    document.documentElement.setAttribute('data-accent', accent);
  }, [accent]);

  // Tweaks protocol
  React.useEffect(() => {
    const handler = e => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent?.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const handleStart = (cfg) => {
    if (!modelsConfigured) { setModelMissingOpen(true); return; }
    /* §5.1 · AI 镶头模式 · 拦袭强制确认 */
    const fp = cfg?.tasks?.frame_prompt;
    if (fp && fp.on && fp.frame_mode === 'AI 镶头分析') {
      const shotFrames = fp.shot_frames === '2 帧 · 首+尾' ? 2 : 3;
      setShotConfirm({ shots: 42, framesPerShot: shotFrames, pendingCfg: cfg });
      return;
    }
    setProcProgress(0); setRoute('process');
  };
  const confirmShots  = () => { setShotConfirm(null); setProcProgress(0); setRoute('process'); };
  const adjustShots   = () => { setShotConfirm(null); setRoute('home'); };
  const handleProcDone = () => setRoute('results');
  const handlePick = (t) => { setActiveTask(t.id); setTasksOpen(false); setRoute('results'); };
  const handleOpenWorkspace = (t) => { setActiveTask(t.id); setRoute('taskboard'); };
  const handleOpenMaterial = (m) => {
    /* §11.3 · 进行中/排队/错误 → Processing；完成 → 类型详情页 */
    if (m && (m.state === 'running' || m.state === 'queued' || m.state === 'error')) {
      setActiveProcId(m.id);
      setRoute('process');
      return;
    }
    setActiveMedia(m);
    const routeMap = { video:'video_detail', image:'image_detail', audio:'audio_detail', text:'text_detail' };
    setRoute(routeMap[m.type] || 'video_detail');
  };

  const mainContent = (() => {
    switch(route) {
      case 'home': return <Workbench
                                onAddMaterial={(seed) => { setAddMatSeed(seed||null); setAddMatOpen(true); }}
                                onOpenWorkspace={handleOpenWorkspace}
                                onOpenMaterial={handleOpenMaterial}
                                onSeeAllWorkspaces={() => setRoute('library')}
                                recentMode={recentMode}/>;
      case 'taskboard': return <Taskboard onAddMaterial={()=>setAddMatOpen(true)} onOpenMaterial={handleOpenMaterial}/>;
      case 'process': return <Processing progress={procProgress} onDone={handleProcDone} onCancel={() => setRoute('home')}
                                  currentTaskId={activeProcId} onSwitchTask={(id) => setActiveProcId(id)}/>;
      case 'results': return <Results layout={layout} onOpenStoryboard={() => setRoute('storyboard')}/>;
      case 'storyboard': return <Storyboard active={sbVariant} setActive={setSbVariant}/>;
      case 'video_detail': return <VideoDetail material={activeMedia} onBack={() => setRoute('taskboard')} onAddFavorite={() => {}}/>;
      case 'image_detail': return <ImageDetail material={activeMedia} onBack={() => setRoute('taskboard')} onMultiCompare={() => setRoute('multi_image')}/>;
      case 'audio_detail': return <AudioDetail material={activeMedia} onBack={() => setRoute('taskboard')}/>;
      case 'text_detail':  return <TextDetail  material={activeMedia} onBack={() => setRoute('taskboard')} onMultiCompare={() => setRoute('multi_text')}/>;
      case 'multi_image':  return <MultiImageCompare onBack={() => setRoute('image_detail')}/>;
      case 'multi_text':   return <MultiTextCompare onBack={() => setRoute('text_detail')}/>;
      case 'library': return <Library
                                  onPickTask={handleOpenWorkspace}
                                  onPickItem={(libItem) => {
                                    const real = VM_DATA.MATERIALS.find(m => m.id === libItem.item_id);
                                    handleOpenMaterial(real || { ...libItem, id: libItem.item_id, title: libItem.name });
                                  }}
                                  onCreateTask={() => setAddMatOpen(true)}/>;
      case 'director': return <Director/>;
      case 'settings': return <Settings/>;
      case 'overview': return <OverviewCanvas setRoute={setRoute}/>;
      case 'search':   return <SearchGlobal/>;
      default: return (
        <div style={{display:'grid', placeItems:'center', height:'100%', opacity:0.5}}>
          <span style={{fontFamily:'var(--mono)', fontSize:12}}>Coming soon · {route}</span>
        </div>
      );
    }
  })();

  return (
    <div className="app-shell">
      <Sidebar route={route} setRoute={setRoute}/>
      <div className="workarea">
        <Topbar route={route} onOpenTasks={() => setTasksOpen(true)}
                theme={theme} setTheme={setTheme}
                onToggleTweaks={() => setTweaksOpen(o=>!o)}
                tasksCount={VM_DATA.TASKS.filter(t=>t.state==='running'||t.state==='queued').length}/>
        <div className="main-scroll">
          {mainContent}
        </div>
      </div>

      <TasksDrawer open={tasksOpen} onClose={() => setTasksOpen(false)}
                   tasks={VM_DATA.TASKS} activeId={activeTask} onPick={handlePick}/>

      <AddMaterialModal open={addMatOpen} onClose={()=>setAddMatOpen(false)}
                        urlValue={addMatSeed?.url}
                        workspaceIds={addMatSeed?.workspaceIds}
                        onFineTune={(cfg)=>{
                          setAddMatOpen(false);
                          setPreflightSeed({ url: cfg.url || addMatSeed?.url, kind: cfg.type, bg: cfg.bg });
                          setPreflightOpen(true);
                        }}
                        onSubmit={()=>{
                          setAddMatOpen(false);
                          if (!modelsConfigured) { setModelMissingOpen(true); return; }
                          setProcProgress(0); setRoute('process');
                        }}/>

      {/* Preflight drawer (细调…) lifted from Workbench */}
      <Preflight
        open={preflightOpen}
        onClose={() => setPreflightOpen(false)}
        onStart={() => {
          setPreflightOpen(false);
          if (!modelsConfigured) { setModelMissingOpen(true); return; }
          setProcProgress(0); setRoute('process');
        }}
        sourceUrl={preflightSeed?.url}
        defaultKind={preflightSeed?.kind || 'video'}/>

      {/* §13 · 未配置模型弹窗 */}
      <ModelMissingDialog
        open={modelMissingOpen}
        onClose={() => setModelMissingOpen(false)}
        onGoSettings={() => {
          setModelMissingOpen(false);
          setRoute('settings');
          // demo: 打开弹窗后默认让模型变为“已配置” —— 下次点开始就会走通
          setTimeout(() => setModelsConfigured(true), 600);
        }}/>

      {/* §5.1 · 镶头确认中断点 */}
      <ShotConfirmModal
        open={!!shotConfirm}
        shots={shotConfirm?.shots || 0}
        framesPerShot={shotConfirm?.framesPerShot || 3}
        onClose={() => setShotConfirm(null)}
        onConfirm={confirmShots}
        onAdjust={adjustShots}/>

      {/* §11.3 · 全局浮动「任务」面板 · 除 overview 外所有页面可见 (含 process，实现并存) */}
      {!['overview'].includes(route) && (
        <FloatingQueue
          currentTaskId={route === 'process' ? activeProcId : null}
          onSelectTask={(task) => {
            /* 进行中/排队/错误 → 到 Processing 详情，并切换当前任务。已完成 → 素材详情页。 */
            if (task.state === 'done') {
              const real = VM_DATA.MATERIALS.find(m => m.id === task.id);
              if (real) handleOpenMaterial(real);
            } else {
              setActiveProcId(task.id);
              setRoute('process');
            }
          }}/>
      )}

      <Tweaks open={tweaksOpen} onClose={() => setTweaksOpen(false)}
              theme={theme} setTheme={setTheme}
              density={density} setDensity={setDensity}
              accent={accent} setAccent={setAccent}
              layout={layout} setLayout={setLayout}
              lang={lang} setLang={setLang}
              recentMode={recentMode} setRecentMode={setRecentMode}
              modelsConfigured={modelsConfigured} setModelsConfigured={setModelsConfigured}/>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
