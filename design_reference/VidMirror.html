<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>VidMirror — AI 视频创作工作台</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css?v=3"/>

<!-- Google font for CJK serif -->
<style>
/* ─── Extra styles for new components not in styles.css ─── */

/* Animated dots */
.proc-dots span { animation: proc-blink 1.4s infinite both; }
.proc-dots span:nth-child(2) { animation-delay: 0.2s; }
.proc-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes proc-blink { 0%,80%,100% { opacity: 0.2; } 40% { opacity: 1; } }

/* Caret blink */
.caret { animation: blink 0.9s step-end infinite; }
@keyframes blink { 50% { opacity: 0; } }

/* btn-lg variant */
.btn-lg { height: 42px; padding: 0 20px; font-size: 15px; }

/* Hero h1 */
.hero h1.display .accent-pink  { color: var(--accent); }
.hero h1.display .accent-purple { color: var(--accent-2); }
.hero h1.display .accent-blue  { color: var(--accent-3); }

/* fix .hero p → use .lede */
.hero .lede {
  font-size: 17px; line-height: 1.55; color: var(--ink-2);
  max-width: 600px; margin: 0 0 44px;
}

/* Composer comp-top alias */
.comp-top {
  display: flex; align-items: center; gap: 14px;
  padding: 20px 24px;
  border-bottom: 1px solid var(--line);
}
.comp-top input {
  flex: 1; font-size: 20px;
  background: transparent; border: none; outline: none;
  color: var(--ink); min-width: 0;
}
.comp-top input::placeholder { color: var(--ink-4); }
.comp-top .platform {
  width: 40px; height: 40px; border-radius: 12px;
  display: grid; place-items: center;
  background: var(--bg-sunken); color: var(--ink-2); flex-shrink: 0;
}

/* Step pill icon fix */
.step-pill svg { flex-shrink: 0; }

/* Results split (when layout=split) */
.res-split {
  display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
  min-height: 0;
}
.res-head {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 20px; margin-bottom: 20px;
}
.rh-left { flex: 1; min-width: 0; }
.rh-right { display: flex; gap: 8px; flex-shrink: 0; flex-wrap: wrap; }
.rh-eyebrow { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
.rh-title {
  font-family: var(--display); font-size: 36px;
  line-height: 1.05; margin: 0 0 10px; letter-spacing: -0.01em;
}
.rh-title span { color: var(--ink-3); font-size: 24px; }
.rh-by {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: var(--ink-3);
}
.avatar {
  width: 24px; height: 24px; border-radius: 99px;
  background: var(--ink); color: var(--bg);
  display: grid; place-items: center;
  font-size: 10px; font-weight: 700; font-family: var(--mono);
}

/* Player */
.player {
  aspect-ratio: 16/9; background: var(--pbg, #000);
  border-radius: 16px; position: relative; overflow: hidden;
  cursor: pointer;
}
.player img { width: 100%; height: 100%; object-fit: cover; display: block; }
.pl-overlay {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 16px;
  background: linear-gradient(0deg, rgba(0,0,0,0.7) 0%, transparent);
  color: #fff;
}
.pl-ts { font-family: var(--mono); font-size: 10px; opacity: 0.7; }
.pl-title { font-size: 16px; font-weight: 700; margin-top: 3px; }
.pl-sub { font-size: 11px; opacity: 0.7; }
.pl-play {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  width: 52px; height: 52px; border-radius: 99px;
  background: rgba(255,255,255,0.9); color: #000;
  display: grid; place-items: center;
}

/* Frame strip */
.frame-strip {
  display: flex; gap: 6px; overflow-x: auto;
  padding: 10px 0 6px;
  scroll-snap-type: x mandatory;
}
.fs-item {
  flex-shrink: 0; width: 100px; scroll-snap-align: start;
  cursor: pointer;
  border-radius: 8px; overflow: hidden;
  border: 2px solid transparent;
  transition: border-color 140ms ease, transform 140ms ease;
  background: var(--bg-sunken);
}
.fs-item[data-active="true"] { border-color: var(--accent); }
.fs-item:hover { transform: translateY(-1px); }
.fs-item img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
.fs-ts { font-family: var(--mono); font-size: 9px; color: var(--ink-3); padding: 3px 6px 0; }
.fs-t { font-size: 10px; padding: 1px 6px 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Keyword row */
.kw-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; padding-top: 12px; }
.kw-lab { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); }
.kw {
  padding: 4px 10px; border-radius: 99px;
  background: var(--bg-sunken); border: 1px solid var(--line);
  font-size: 12px; color: var(--ink-2);
}

/* Notes tabs */
.rn-tabs {
  display: flex; align-items: center; gap: 4px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--line);
  background: var(--bg-elev);
  position: sticky; top: 0; z-index: 2;
}
.rn-tabs button {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 12px; border-radius: 10px;
  font-size: 12.5px; font-weight: 500;
  color: var(--ink-3);
  transition: all 120ms ease;
}
.rn-tabs button[data-active="true"] { background: var(--ink); color: var(--bg); }
.rn-tabs button:hover:not([data-active="true"]) { background: var(--bg-sunken); color: var(--ink); }
.rn-tabs-spacer { flex: 1; }
.rn-body { flex: 1; overflow-y: auto; padding: 18px 22px; }
.rn-foot {
  padding: 10px 16px;
  border-top: 1px solid var(--line);
  display: flex; align-items: center; gap: 10px;
}
.ai-in {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px;
  background: var(--bg-sunken); border: 1px solid var(--line);
  border-radius: 99px;
  font-size: 13px; color: var(--ink-3);
  flex: 1;
}
.ai-in input { flex: 1; background: transparent; border: none; outline: none; font-size: 13px; }

/* Transcript alternate classes used in results.jsx */
.tr-line { display: grid; grid-template-columns: 58px 1fr; gap: 12px; padding: 8px 6px; border-radius: 6px; cursor: pointer; }
.tr-line:hover { background: var(--bg-sunken); }
.tr-line[data-active="true"] { background: linear-gradient(90deg, rgba(255,77,126,0.08), transparent); }
.tr-line .ts { font-family: var(--mono); font-size: 11px; color: var(--ink-3); padding-top: 2px; }
.tr-line[data-active="true"] .ts { color: var(--accent); }
.tr-line .txt { font-size: 14px; line-height: 1.55; color: var(--ink-2); }
.tr-line[data-active="true"] .txt { color: var(--ink); font-weight: 500; }

/* Mindmap override */
.mindmap svg text { font-family: var(--sans); }
.mm-svg { width: 100%; height: 100%; }

/* Processing extras */
.proc { height: 100%; display: flex; flex-direction: column; overflow-y: auto; padding: 28px 32px; gap: 24px; }
.proc-head { display: flex; align-items: flex-start; justify-content: space-between; }
.proc-title h1 { font-family: var(--display); font-size: 48px; margin: 8px 0 10px; letter-spacing: -0.02em; }
.proc-eyebrow { font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); }
.proc-sub { display: flex; gap: 8px; flex-wrap: wrap; }
.proc-actions { display: flex; gap: 8px; flex-shrink: 0; }
.proc-grid { display: grid; grid-template-columns: 1fr 1fr 300px; gap: 20px; }
.stages { background: var(--bg-elev); border: 1px solid var(--line); border-radius: var(--radius-lg); overflow: hidden; }
.stage { display: grid; grid-template-columns: 32px 40px 1fr auto; gap: 12px; align-items: center; padding: 14px 20px; border-bottom: 1px solid var(--line); }
.stage:last-child { border-bottom: none; }
.stage-num { font-family: var(--mono); font-size: 10px; color: var(--ink-4); }
.stage-ic { width: 36px; height: 36px; border-radius: 10px; display: grid; place-items: center; background: var(--bg-sunken); color: var(--ink-3); transition: all 200ms; }
.stage[data-state="running"] .stage-ic { background: var(--ink); color: var(--bg); }
.stage[data-state="done"] .stage-ic { background: var(--accent-green); color: #fff; }
.stage[data-state="queued"] { opacity: 0.5; }
.stage-top { display: flex; align-items: center; gap: 8px; }
.stage-t { font-size: 14px; font-weight: 600; }
.stage-s { font-family: var(--mono); font-size: 10px; color: var(--ink-3); letter-spacing: 0.08em; }
.stage-pct { font-family: var(--mono); font-size: 12px; color: var(--ink-3); }
.stage[data-state="running"] .stage-pct { color: var(--ink); }
.stage[data-state="done"] .stage-pct { color: var(--accent-green); }
.stage-bar { height: 2px; background: var(--bg-sunken); border-radius: 2px; overflow: hidden; margin-top: 5px; }
.stage-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2), var(--accent-3)); transition: width 400ms ease; }
.stage[data-state="done"] .stage-fill { background: var(--accent-green); }
.proc-preview { background: var(--bg-elev); border: 1px solid var(--line); border-radius: var(--radius-lg); overflow: hidden; display: flex; flex-direction: column; }
.pp-eyebrow { display: flex; align-items: center; gap: 8px; padding: 12px 16px; border-bottom: 1px solid var(--line); font-size: 12px; font-family: var(--mono); color: var(--ink-3); }
.pp-frames { flex: 1; padding: 12px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; overflow: hidden; }
.pp-fr { border-radius: 6px; overflow: hidden; opacity: 0.5; transition: opacity 200ms, transform 200ms; }
.pp-fr[data-active="true"] { opacity: 1; transform: scale(1.04); outline: 2px solid var(--accent); }
.pp-fr img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
.pp-fr-meta { padding: 4px 6px; font-size: 9px; font-family: var(--mono); color: var(--ink-3); display: flex; gap: 6px; background: var(--bg-sunken); }
.pp-waveform { display: flex; align-items: flex-end; gap: 1.5px; height: 40px; padding: 6px 12px; background: var(--bg-sunken); border-top: 1px solid var(--line); }
.wv-bar { flex: 1; background: var(--ink-3); border-radius: 1px; transition: opacity 300ms; }
.proc-logs { background: var(--bg-elev); border: 1px solid var(--line); border-radius: var(--radius-lg); overflow: hidden; display: flex; flex-direction: column; }
.pl-head { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid var(--line); font-family: var(--mono); font-size: 11px; color: var(--ink-3); }
.pl-body { flex: 1; overflow-y: auto; padding: 10px 14px; font-family: var(--mono); font-size: 11px; display: flex; flex-direction: column; gap: 4px; }
.pl-line { display: flex; gap: 8px; padding: 2px 0; }
.pl-ts { color: var(--ink-4); flex-shrink: 0; }
.pl-s { flex-shrink: 0; }
.pl-s[data-s="dl"]  { color: var(--accent-3); }
.pl-s[data-s="fr"]  { color: var(--accent-warm); }
.pl-s[data-s="asr"] { color: var(--accent); }
.pl-s[data-s="vlm"] { color: var(--accent-2); }
.pl-s[data-s="sum"] { color: var(--accent-green); }
.pl-s[data-s="st"]  { color: var(--ink-2); }
.pl-cursor { opacity: 0.5; }
.proc-bar { background: var(--bg-elev); border: 1px solid var(--line); border-radius: var(--radius); padding: 14px 20px; }
.pb-track { position: relative; height: 4px; background: var(--bg-sunken); border-radius: 4px; overflow: hidden; }
.pb-fill { position: absolute; top: 0; left: 0; bottom: 0; background: linear-gradient(90deg, var(--accent), var(--accent-2), var(--accent-3)); transition: width 400ms ease; border-radius: 4px; }
.pb-tick { position: absolute; top: -4px; bottom: -4px; width: 1px; background: var(--bg-elev); opacity: 0.6; }
.pb-labels { position: relative; height: 18px; margin-top: 4px; }
.pb-lab { position: absolute; transform: translateX(-50%); font-family: var(--mono); font-size: 9px; color: var(--ink-4); letter-spacing: 0.08em; }

/* storyboard extras */
.sbd-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; margin-bottom: 20px; }
.sbd-t { font-family: var(--display); font-size: 26px; font-weight: 400; margin: 6px 0 0; line-height: 1.3; max-width: 700px; }
.sbd-stats { display: flex; gap: 14px; }
.sbd-stats > div { text-align: center; }
.sbd-stats .mono { font-family: var(--display); font-size: 32px; }
.sbd-stats span { font-family: var(--mono); font-size: 10px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.1em; }

/* data-dim */
[data-dim="true"] { opacity: 0.5; cursor: not-allowed !important; }

/* btn-run icon */
.btn-run .iconwrap { width: 28px; height: 28px; }

/* proc-wrap: actual layout */
.proc-wrap {
  max-width: 1440px;
  padding: 28px;
}

/* zh-en helper */
.zh-en { font-size: 13px; font-family: var(--mono); color: var(--ink-4); letter-spacing: 0.08em; }

/* workarea scroll */
.workarea { height: 100%; overflow: hidden; }
.main-scroll { height: 100%; overflow-y: auto; }

/* eyebrow helper */
.eyebrow {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--ink-3);
}

/* Mindmap svg variables */
.mm-svg { --fg: var(--ink); --fg-2: var(--ink-2); --bg: var(--bg-elev); }

/* ─────────────────────────────────────────
   v2.1 Taskboard
   ───────────────────────────────────────── */
.tb-wrap { max-width: 1400px; margin: 0 auto; padding: 28px 32px 48px; }
.tb-head {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 24px; margin-bottom: 28px;
}
.tb-head-l { flex: 1; min-width: 0; }
.tb-head-r { display: flex; gap: 8px; flex-shrink: 0; padding-top: 28px; }
.tb-ctx {
  display: grid; grid-template-columns: auto 1fr auto 1fr auto 1fr;
  gap: 6px 16px; max-width: 900px; align-items: baseline;
}
.ctx-k { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--ink-3); }
.ctx-v { font-size: 13px; color: var(--ink-2); }

.tb-tabs {
  display: flex; gap: 2px; padding: 5px;
  background: var(--bg-sunken); border-radius: 14px;
  margin-bottom: 24px; flex-wrap: wrap;
}
.tb-tab {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 14px; border-radius: 10px;
  font-size: 13px; font-weight: 500; color: var(--ink-3);
  transition: all 160ms ease;
}
.tb-tab[data-active="true"] {
  background: var(--bg-elev); color: var(--ink);
  box-shadow: var(--shadow-sm);
}
.tb-tab:hover:not([data-active="true"]) { color: var(--ink); }
.tb-tab-n {
  display: inline-grid; place-items: center;
  min-width: 20px; height: 18px; padding: 0 6px;
  border-radius: 99px; background: var(--bg-sunken);
  font-family: var(--mono); font-size: 10px;
}
.tb-tab[data-active="true"] .tb-tab-n { background: var(--ink); color: var(--bg); }

.tb-head-mini {
  display: flex; align-items: flex-end; justify-content: space-between;
  margin-bottom: 18px; gap: 16px; flex-wrap: wrap;
}

/* Materials grid */
.tb-mat-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px;
}
.mat-card {
  background: var(--bg-elev); border: 1px solid var(--line);
  border-radius: var(--radius); overflow: hidden;
  display: flex; flex-direction: column;
  transition: all 200ms ease; cursor: pointer;
}
.mat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.mat-thumb { position: relative; aspect-ratio: 16/9; background: var(--bg-sunken); overflow: hidden; }
.mat-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.mat-type {
  position: absolute; top: 10px; left: 10px;
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 9px; border-radius: 99px;
  background: rgba(0,0,0,0.7); color: #fff;
  font-size: 10px; font-weight: 600;
}
.mat-type[data-tone="pink"]   { background: var(--accent); }
.mat-type[data-tone="purple"] { background: var(--accent-2); }
.mat-type[data-tone="blue"]   { background: var(--accent-3); }
.mat-type[data-tone="amber"]  { background: var(--accent-warm); color: #111; }
.mat-prog {
  position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
  background: rgba(0,0,0,0.2);
}
.mat-prog > div { height: 100%; background: var(--accent); transition: width 400ms; }
.mat-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 6px; }
.mat-title { font-size: 14px; font-weight: 600; line-height: 1.35;
  overflow: hidden; text-overflow: ellipsis;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.mat-meta { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--ink-3); }
.mat-meta .dot { width: 6px; height: 6px; border-radius: 99px; flex-shrink: 0; }
.mat-sub { font-size: 11px; color: var(--ink-4); }
.mat-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 4px; }

.mat-add {
  border: 2px dashed var(--line-strong); background: transparent;
  min-height: 240px; display: grid; place-items: center;
}
.mat-add:hover { border-color: var(--ink); background: var(--bg-sunken); }
.mat-add-inner { text-align: center; color: var(--ink-3); padding: 20px; }
.mat-add-inner svg { color: var(--ink-3); }
.mat-add:hover .mat-add-inner { color: var(--ink); }
.mat-add-types { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; margin-top: 12px; }

/* Tag library */
.tb-tag-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 14px; }
.tag-col { background: var(--bg-elev); border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; }
.tag-col-h {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px; border-bottom: 1px solid var(--line);
  font-family: var(--display); font-size: 20px;
}
.tag-col-b { padding: 8px 8px 10px; display: flex; flex-direction: column; gap: 2px; }
.tag-row {
  display: grid; grid-template-columns: 1fr auto; gap: 10px;
  padding: 8px 10px; border-radius: 8px; align-items: center;
}
.tag-row:hover { background: var(--bg-sunken); }
.tag-l { display: flex; align-items: center; gap: 8px; min-width: 0; }
.tag-name { font-size: 13px; font-weight: 500; }
.tag-badge {
  padding: 1px 6px; border-radius: 4px;
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.06em;
}
.tag-badge.auto { background: rgba(60,119,251,0.12); color: var(--accent-3); }
.tag-badge.manual { background: var(--bg-sunken); color: var(--ink-3); border: 1px solid var(--line); }
.tag-r { display: flex; align-items: center; gap: 8px; }
.tag-bar { width: 60px; height: 4px; background: var(--bg-sunken); border-radius: 4px; overflow: hidden; }
.tag-bar > span { display: block; height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); }

/* Favorites */
.fav-split { display: grid; grid-template-columns: 360px 1fr; gap: 16px; }
.fav-list { display: flex; flex-direction: column; gap: 6px; }
.fav-item {
  display: grid; grid-template-columns: 80px 1fr auto;
  gap: 12px; align-items: center; padding: 10px;
  background: var(--bg-elev); border: 1px solid var(--line);
  border-radius: 14px; cursor: pointer; transition: all 160ms ease;
}
.fav-item:hover { border-color: var(--ink-3); }
.fav-item[data-active="true"] { border-color: var(--ink); background: var(--bg-sunken); }
.fav-th { aspect-ratio: 16/9; background: var(--bg-sunken); border-radius: 8px; overflow: hidden; }
.fav-th img { width: 100%; height: 100%; object-fit: cover; display: block; }
.fav-note { font-size: 13px; font-weight: 600; line-height: 1.3; }
.fav-meta { min-width: 0; }

.fav-detail { background: var(--bg-elev); border: 1px solid var(--line); border-radius: var(--radius-lg); overflow: hidden; }
.fav-hero { position: relative; aspect-ratio: 16/9; background: var(--bg-sunken); }
.fav-hero img { width: 100%; height: 100%; object-fit: cover; display: block; }
.fav-hero-ov {
  position: absolute; bottom: 0; left: 0; right: 0; padding: 14px;
  background: linear-gradient(0deg, rgba(0,0,0,0.8), transparent);
  color: #fff; display: flex; gap: 12px; align-items: center;
  font-size: 14px; font-weight: 600;
}
.fav-prompt { padding: 18px 20px; }
.fp-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.fp-text {
  font-family: var(--mono); font-size: 13px; line-height: 1.6;
  background: var(--bg-sunken); padding: 14px 16px;
  border-radius: 12px; border: 1px solid var(--line);
  color: var(--ink);
}
.fp-foot { display: flex; gap: 8px; margin-top: 14px; }

/* Style report */
.style-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  grid-auto-rows: minmax(200px, auto); gap: 14px;
}
.style-panel { background: var(--bg-elev); border: 1px solid var(--line); border-radius: var(--radius); padding: 18px 20px; overflow: hidden; }
.style-panel.span-2 { grid-column: span 2; }
.sp-h { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }

.wordcloud {
  display: flex; flex-wrap: wrap; gap: 8px 16px; align-items: baseline;
  line-height: 1.15; font-family: var(--display);
  padding: 8px 0;
}
.wc-w { transition: transform 200ms; cursor: pointer; }
.wc-w:hover { transform: scale(1.05); }

.palette { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; height: 120px; }
.pal-sw {
  border-radius: 10px; position: relative; overflow: hidden;
  display: flex; align-items: flex-end; padding: 8px;
}
.pal-sw span {
  font-size: 9px; letter-spacing: 0.05em;
  color: rgba(255,255,255,0.9); text-shadow: 0 1px 2px rgba(0,0,0,0.5);
  background: rgba(0,0,0,0.35); padding: 2px 6px; border-radius: 4px;
}

.shots-bar { display: flex; flex-direction: column; gap: 10px; }
.sb-item { }
.sb-lab { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; font-weight: 500; }
.sb-bar { height: 6px; background: var(--bg-sunken); border-radius: 4px; overflow: hidden; }
.sb-bar > span { display: block; height: 100%; border-radius: 4px; }

.music-line { display: flex; gap: 30px; }

.advice { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
.advice li {
  display: grid; grid-template-columns: 28px 1fr; gap: 10px;
  font-size: 13px; line-height: 1.55;
}
.ad-n { color: var(--ink-3); font-size: 11px; padding-top: 3px; }

/* Compare */
.cmp-stage {
  display: grid; grid-template-columns: 1fr auto 1fr; gap: 16px;
  margin-bottom: 16px; align-items: stretch;
}
.cmp-img {
  background: var(--bg-elev); border: 1px solid var(--line);
  border-radius: var(--radius); overflow: hidden; position: relative;
}
.cmp-img img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
.cmp-label {
  position: absolute; top: 12px; left: 12px;
  padding: 4px 10px; background: rgba(0,0,0,0.7); color: #fff;
  border-radius: 99px; font-size: 11px; font-weight: 600;
}
.cmp-foot { padding: 10px 14px; font-size: 11px; color: var(--ink-3); border-top: 1px solid var(--line); }

.cmp-score {
  position: relative; background: var(--bg-elev); border: 1px solid var(--line);
  border-radius: var(--radius); padding: 20px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-width: 160px;
}
.cmp-num { font-size: 72px; line-height: 1; margin: 4px 0; }
.cmp-ring { position: absolute; inset: 0; display: grid; place-items: center; pointer-events: none; }
.cmp-ring svg { width: 180px; height: 180px; }

.cmp-split { display: grid; grid-template-columns: 1.3fr 1fr; gap: 14px; }
.cmp-panel { background: var(--bg-elev); border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; }
.cmp-deltas { padding: 10px 18px 18px; display: flex; flex-direction: column; gap: 14px; }
.cmp-delta { }
.cd-l { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
.cd-dim { font-size: 13px; font-weight: 600; }
.cd-pct { font-size: 14px; font-weight: 700; }
.cd-bar { height: 5px; background: var(--bg-sunken); border-radius: 4px; overflow: hidden; }
.cd-bar > span { display: block; height: 100%; border-radius: 4px; }
.cd-note { font-size: 12px; color: var(--ink-3); margin-top: 5px; }

/* Version history */
.ver-split { display: grid; grid-template-columns: 360px 1fr; gap: 16px; }
.ver-timeline { display: flex; flex-direction: column; gap: 0; }
.ver-node {
  position: relative; display: grid; grid-template-columns: 30px 1fr;
  padding: 14px 12px 14px 0; cursor: pointer;
  border-radius: 10px;
}
.ver-node[data-active="true"] { background: var(--bg-sunken); }
.vn-dot {
  position: relative; z-index: 2;
  width: 14px; height: 14px; border-radius: 99px;
  background: var(--bg-elev); border: 2px solid var(--ink-4);
  margin: 4px 8px 0;
}
.vn-dot[data-active="true"] { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 0 4px rgba(255,77,126,0.15); }
.vn-line {
  position: absolute; top: 22px; left: 15px; bottom: -6px;
  width: 2px; background: var(--line-strong);
}
.vn-body { min-width: 0; }
.vn-v { display: flex; align-items: baseline; gap: 10px; margin-bottom: 3px; }
.vn-by {
  font-family: var(--mono); font-size: 9px;
  padding: 1px 6px; border-radius: 4px;
}
.vn-by.auto { background: rgba(60,119,251,0.12); color: var(--accent-3); }
.vn-by.you  { background: var(--bg-sunken); color: var(--ink-2); }
.vn-note { font-size: 13px; color: var(--ink-2); margin-top: 5px; line-height: 1.5; }

.ver-view { background: var(--bg-elev); border: 1px solid var(--line); border-radius: var(--radius-lg); padding: 22px 24px; }
.ver-text {
  font-family: var(--mono); font-size: 13px; line-height: 1.7;
  background: var(--bg-sunken); padding: 16px 18px;
  border-radius: 12px; border: 1px solid var(--line);
}

/* Export */
.exp-list { background: var(--bg-elev); border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; }
.exp-row {
  display: grid; grid-template-columns: 40px 40px 1fr 100px 80px;
  align-items: center; gap: 14px;
  padding: 14px 20px; border-bottom: 1px solid var(--line);
  cursor: pointer; transition: background 140ms;
}
.exp-row:last-child { border-bottom: none; }
.exp-row:hover { background: var(--bg-sunken); }
.exp-row[data-on="false"] { opacity: 0.4; }
.exp-chk {
  width: 20px; height: 20px; border-radius: 6px;
  border: 1.5px solid var(--line-strong);
  display: grid; place-items: center;
  color: var(--bg); background: transparent;
}
.exp-row[data-on="true"] .exp-chk { background: var(--ink); border-color: var(--ink); }
.exp-ic {
  width: 32px; height: 32px; border-radius: 8px; background: var(--bg-sunken);
  display: grid; place-items: center; color: var(--ink-2);
}
.exp-nm { display: flex; flex-direction: column; gap: 3px; }
.exp-nm .mono { font-size: 13px; color: var(--ink); font-weight: 500; }
.exp-count, .exp-size { font-size: 11px; color: var(--ink-3); text-align: right; }

.exp-foot {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 14px; padding: 16px 20px;
  background: var(--bg-elev); border: 1px dashed var(--line-strong); border-radius: var(--radius);
}
.exp-path {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 13px; color: var(--ink-2);
}

/* Modal */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  opacity: 0; pointer-events: none; transition: opacity 200ms;
  z-index: 40;
}
.modal-backdrop[data-open="true"] { opacity: 1; pointer-events: auto; }
.modal {
  position: fixed; left: 50%; top: 50%;
  transform: translate(-50%, -48%) scale(0.98);
  width: 720px; max-width: calc(100vw - 40px);
  max-height: calc(100vh - 60px); overflow: auto;
  background: var(--bg-elev); border: 1px solid var(--line);
  border-radius: var(--radius-lg); box-shadow: var(--shadow-lg);
  opacity: 0; pointer-events: none; transition: all 220ms ease;
  z-index: 41;
}
.modal[data-open="true"] {
  opacity: 1; pointer-events: auto;
  transform: translate(-50%, -50%) scale(1);
}
.m-head {
  display: flex; align-items: flex-start; justify-content: space-between;
  padding: 22px 24px; border-bottom: 1px solid var(--line);
}
.m-body { padding: 22px 24px; display: flex; flex-direction: column; gap: 24px; }
.m-section { }
.m-foot {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 24px; border-top: 1px solid var(--line);
  background: var(--bg-sunken);
  border-radius: 0 0 var(--radius-lg) var(--radius-lg);
}

.type-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.type-card {
  display: flex; flex-direction: column; gap: 6px;
  padding: 16px 14px; background: var(--bg-sunken);
  border: 1.5px solid transparent; border-radius: 14px;
  transition: all 140ms ease; color: var(--ink-3);
  align-items: flex-start;
}
.type-card[data-active="true"] {
  background: var(--bg-elev); border-color: var(--ink); color: var(--ink);
  box-shadow: var(--shadow-sm);
}
.type-card:hover:not([data-active="true"]) { color: var(--ink); }
.tc-l { font-size: 14px; font-weight: 600; }
.tc-en { font-size: 10px; color: var(--ink-3); letter-spacing: 0.05em; }

.task-chips { display: flex; gap: 8px; flex-wrap: wrap; }
.task-chip {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 14px; border-radius: 99px;
  background: var(--bg-sunken); border: 1px solid var(--line);
  font-size: 13px; color: var(--ink-2); transition: all 140ms;
}
.task-chip[data-on="true"] {
  background: var(--ink); color: var(--bg); border-color: var(--ink);
}
.tc-box {
  width: 16px; height: 16px; border-radius: 4px;
  border: 1.5px solid var(--line-strong);
  display: grid; place-items: center; color: var(--bg);
}
.task-chip[data-on="true"] .tc-box { background: var(--bg); border-color: var(--bg); color: var(--ink); }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="app"></div>

<script src="components/data.js?v=21"></script>
<script type="text/babel" src="components/icons.jsx"></script>
<script type="text/babel" src="components/shell.jsx"></script>
<script type="text/babel" src="components/workbench.jsx"></script>
<script type="text/babel" src="components/taskboard.jsx"></script>
<script type="text/babel" src="components/materials.jsx"></script>
<script type="text/babel" src="components/processing.jsx"></script>
<script type="text/babel" src="components/results.jsx"></script>
<script type="text/babel" src="components/storyboard.jsx"></script>
<script type="text/babel" src="components/settings.jsx"></script>
<script type="text/babel" src="components/task_chat.jsx"></script>
<script type="text/babel" src="components/queue_panel.jsx"></script>
<script type="text/babel" src="components/video_detail.jsx"></script>
<script type="text/babel" src="components/image_detail.jsx"></script>
<script type="text/babel" src="components/audio_detail.jsx"></script>
<script type="text/babel" src="components/text_detail.jsx"></script>
<script type="text/babel" src="components/overview.jsx"></script>

<script type="text/babel">
/* ─── App root ─── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "density": "compact",
  "accent": "lime",
  "layout": "stack",
  "lang": "zh"
}/*EDITMODE-END*/;

const App = () => {
  const saved = (() => { try { return JSON.parse(localStorage.getItem('vm-state') || '{}'); } catch { return {}; } })();
  const tweaks = (() => { try { return {...TWEAK_DEFAULTS, ...JSON.parse(localStorage.getItem('vm-tweaks')||'{}')}; } catch { return TWEAK_DEFAULTS; } })();

  const [route, setRoute] = React.useState(saved.route || 'home');
  const [theme, setTheme] = React.useState(tweaks.theme);
  const [density, setDensity] = React.useState(tweaks.density);
  const [accent, setAccent] = React.useState(tweaks.accent);
  const [layout, setLayout] = React.useState(tweaks.layout);
  const [lang, setLang] = React.useState(tweaks.lang);
  const [tweaksOpen, setTweaksOpen] = React.useState(false);
  const [tasksOpen, setTasksOpen] = React.useState(false);
  const [activeTask, setActiveTask] = React.useState(VM_DATA.TASKS[0].id);
  const [sbVariant, setSbVariant] = React.useState('A');
  const [addMatOpen, setAddMatOpen] = React.useState(false);
  const [activeMedia, setActiveMedia] = React.useState(null);

  // Simulate processing progress
  const [procProgress, setProcProgress] = React.useState(saved.procProgress ?? 0.42);
  React.useEffect(() => {
    if (route !== 'process') return;
    if (procProgress >= 1) return;
    const t = setInterval(() => setProcProgress(p => Math.min(1, p + 0.004)), 180);
    return () => clearInterval(t);
  }, [route, procProgress]);

  // Auto-advance to results when processing completes
  React.useEffect(() => {
    if (route === 'process' && procProgress >= 1) {
      const t = setTimeout(() => setRoute('results'), 900);
      return () => clearTimeout(t);
    }
  }, [route, procProgress]);

  // Persist
  React.useEffect(() => {
    localStorage.setItem('vm-state', JSON.stringify({ route, procProgress }));
  }, [route, procProgress]);
  React.useEffect(() => {
    const t = {theme, density, accent, layout, lang};
    localStorage.setItem('vm-tweaks', JSON.stringify(t));
    window.parent?.postMessage({ type: '__edit_mode_set_keys', edits: t }, '*');
  }, [theme, density, accent, layout, lang]);

  // Apply theme
  React.useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
  }, [theme]);

  // Apply accent
  React.useEffect(() => {
    const map = {
      pink:   ['#FF4D7E','#B84CFF','#3C77FB'],
      sunset: ['#FF6B35','#FF4D7E','#FFB84C'],
      lime:   ['#22D39A','#3C77FB','#7ED957'],
      mono:   ['#444','#666','#888'],
      purple: ['#B84CFF','#7C3AED','#3C77FB'],
    };
    const [a,b,c] = map[accent] || map.pink;
    document.documentElement.style.setProperty('--accent', a);
    document.documentElement.style.setProperty('--accent-2', b);
    document.documentElement.style.setProperty('--accent-3', c);
    document.documentElement.setAttribute('data-accent', accent);
  }, [accent]);

  // Tweaks protocol
  React.useEffect(() => {
    const handler = e => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent?.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const handleStart = () => { setProcProgress(0); setRoute('process'); };
  const handleProcDone = () => setRoute('results');
  const handlePick = (t) => { setActiveTask(t.id); setTasksOpen(false); setRoute('results'); };
  const handleOpenMaterial = (m) => {
    setActiveMedia(m);
    const routeMap = { video:'video_detail', image:'image_detail', audio:'audio_detail', text:'text_detail' };
    setRoute(routeMap[m.type] || 'video_detail');
  };

  const mainContent = (() => {
    switch(route) {
      case 'home': return <Workbench onStart={handleStart}/>;
      case 'taskboard': return <Taskboard onAddMaterial={()=>setAddMatOpen(true)} onOpenMaterial={handleOpenMaterial}/>;
      case 'materials': return <MatExplorer/>;
      case 'process': return <Processing progress={procProgress} onDone={handleProcDone} onCancel={() => setRoute('home')}/>;
      case 'results': return <Results layout={layout} onOpenStoryboard={() => setRoute('storyboard')}/>;
      case 'storyboard': return <Storyboard active={sbVariant} setActive={setSbVariant}/>;
      case 'video_detail': return <VideoDetail material={activeMedia} onBack={() => setRoute('taskboard')} onAddFavorite={() => {}}/>;
      case 'image_detail': return <ImageDetail material={activeMedia} onBack={() => setRoute('taskboard')}/>;
      case 'audio_detail': return <AudioDetail material={activeMedia} onBack={() => setRoute('taskboard')}/>;
      case 'text_detail':  return <TextDetail  material={activeMedia} onBack={() => setRoute('taskboard')}/>;
      case 'library': return <Library/>;
      case 'queue':   return <QueuePanel onOpenMaterial={handleOpenMaterial}/>;
      case 'director': return <Director/>;
      case 'settings': return <Settings/>;
      case 'overview': return <OverviewCanvas setRoute={setRoute}/>;
      default: return (
        <div style={{display:'grid', placeItems:'center', height:'100%', opacity:0.5}}>
          <span style={{fontFamily:'var(--mono)', fontSize:12}}>Coming soon · {route}</span>
        </div>
      );
    }
  })();

  return (
    <div className="app-shell">
      <Sidebar route={route} setRoute={setRoute}/>
      <div className="workarea">
        <Topbar route={route} onOpenTasks={() => setTasksOpen(true)}
                theme={theme} setTheme={setTheme}
                onToggleTweaks={() => setTweaksOpen(o=>!o)}
                tasksCount={VM_DATA.TASKS.filter(t=>t.state==='running'||t.state==='queued').length}/>
        <div className="main-scroll">
          {mainContent}
        </div>
      </div>

      <TasksDrawer open={tasksOpen} onClose={() => setTasksOpen(false)}
                   tasks={VM_DATA.TASKS} activeId={activeTask} onPick={handlePick}/>

      <AddMaterialModal open={addMatOpen} onClose={()=>setAddMatOpen(false)}
                        onSubmit={()=>{ setAddMatOpen(false); setProcProgress(0); setRoute('process'); }}/>

      <Tweaks open={tweaksOpen} onClose={() => setTweaksOpen(false)}
              theme={theme} setTheme={setTheme}
              density={density} setDensity={setDensity}
              accent={accent} setAccent={setAccent}
              layout={layout} setLayout={setLayout}
              lang={lang} setLang={setLang}/>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
